const PHASES=[
  {id:1,title:"World 1-1: A Fazenda Exposta",subtitle:"Solo & Erosão",icon:"🌧️",world:"MUNDO 1",color:"#6B3A1F",accent:"#FFD700",
  story:"Primeiro dia como Técnico Zé Raiz! Seu Raimundo olha o horizonte: a chuva leva sua terra embora. Solo nu, arado três vezes. É o seu World 1-1!",
  questions:[
    {q:"Após chuva de 40mm, a água escoa vermelha pelo terreno exposto. Qual processo está ocorrendo e por que o solo exposto acelera tanto a perda?",ctx:"Solo argiloso, declividade 12%, sem cobertura. Chuva intensa: 60mm/h por 40min.",
    opts:["A. Lixiviação profunda pelo excesso de argila","B. Erosão laminar: gotas de chuva desagregam partículas e o escoamento as transporta — sem cobertura o solo perde 20-40 t/ha/ano","C. Infiltração excessiva mobilizando o horizonte B","D. Capilaridade reversa pelo calor do solo"],
    correct:1,xp:25,diff:1,why:"💡 Cada gota de chuva age como uma minibomba — projeta partículas do solo a 60cm de altura. Em 1h de chuva intensa sobre solo exposto, bilhões dessas explosões desagregam a camada mais fértil. Com 4 t/ha de palha de braquiária, a erosão cai 80-95%. A cobertura é o escudo de HP do solo! (Embrapa: solos sem cobertura no Cerrado perdem 20-40 t/ha/ano.)"},
    {q:"Ao sondar o solo com trado, você encontra camada extremamente dura a 15-20cm marcando 3,8 MPa. Seu Raimundo ara no mesmo nível há 15 anos. Qual é o diagnóstico?",ctx:"Latossolo Vermelho-Amarelo. Histórico: aração convencional há 15 anos.",
    opts:["A. O solo fica naturalmente mais denso em profundidade pela gravidade","B. Pé de arado (hardpan): camada compactada pelo disco — raízes param acima de 2,0 MPa e aqui está em 3,8 MPa","C. Acúmulo de calcário formando crosta subsuperficial","D. Fenômeno natural de argilas expansivas"],
    correct:1,xp:28,diff:1,why:"💡 O pé de arado funciona como bloco de pedra do Mario — raízes simplesmente não passam! Confinadas em 15cm, a planta é vulnerável à seca. Solução: subsolagem com escarificador a 45-50cm + plantio direto permanente. Custo: R$180-280/ha. NUNCA usar arado depois — recriaria o problema."},
    {q:"Análise de solo: pH 4,8 — Al³⁺ = 2,1 cmolc/dm³ — MO = 0,9% — P = 3,2 mg/dm³. Seu Raimundo quer plantar soja semana que vem. Qual sua recomendação?",ctx:"Latossolo Vermelho, 55% argila. 18 anos de soja. Produtividade atual: 42 sc/ha (potencial: 65-72 sc/ha).",
    opts:["A. Pode plantar — soja é resistente e o adubo compensa","B. NÃO plantar agora: pH crítico, Al³⁺ tóxico 7x acima do limite (0,3 cmolc/dm³), MO e P muito baixos. Exige calagem + gessagem + 60-90 dias de espera","C. Só precisa de muito NPK antes de plantar","D. Plantar e observar os primeiros sintomas antes de agir"],
    correct:1,xp:38,diff:2,why:"💡 pH 4,8 = raízes morrem em contato com o Al³⁺ tóxico. Sem raízes profundas, a planta não aguenta a seca. Plano: 3,5-4 t/ha calcário dolomítico (60-90 dias de reação) + 500-800 kg/ha gesso + adubação corretiva. Custo: ~R$1.800/ha. Ganho esperado: +23 sc/ha × R$140 = +R$3.220/ha. Payback em UMA safra!"},
    {q:"Seu Raimundo escava 30×30×30cm na lavoura e encontra ZERO minhocas. No capoeirão vizinho: 47. O que esse contraste revela?",ctx:"Lavoura: pH 4,8, temperatura 42°C, sem cobertura, 3 aplicações de organofosforado/safra.",
    opts:["A. Normal — minhocas não vivem em áreas agricultáveis","B. Colapso da biologia do solo: pH letal, temperatura mata minhocas acima de 38°C, sem MO para alimentar, organofosforados reduzem população em 70-95%","C. As minhocas migraram temporariamente para o capoeirão","D. Minhocas preferem solos secos"],
    correct:1,xp:30,diff:2,why:"💡 300-500 minhocas/m² em solo saudável criam bioporos que aumentam a infiltração em 3-10x. Uma minhoca processa 5-15x seu peso em solo por dia, produzindo bolotas fecais com 5x mais N, 7x mais P e 11x mais K disponível. Zero minhocas = zero infraestrutura biológica. É como servidor de Roblox vazio!"},
    {q:"Seu Raimundo aplicou 180 kg/ha de ureia às 13h, sol a pino, 36°C, solo seco, pH 6,8. Três dias depois não choveu. O que provavelmente aconteceu?",ctx:"Umidade relativa: 28%. Vento: 18 km/h. Custo da ureia: R$540.",
    opts:["A. A ureia ficou armazenada esperando a chuva — sem perda","B. 55-75% do N volatilizou como amônia: pH alto + calor + solo seco + vento = condições ideais para perda máxima. Dos R$540, R$297-405 foram para o ar","C. A ureia se transformou em calcário","D. O N virou nitrato instantaneamente e já está disponível"],
    correct:1,xp:35,diff:2,why:"💡 Reação de volatilização: Ureia + urease → CO₂ + 2 NH₃ (amônia gasosa). Em pH 6,8, temperatura 36°C e solo seco, a reação é quase instantânea. Protocolo correto: aplicar de manhã cedo (5-8h), com chuva prevista em 12-24h, ou usar ureia + inibidor NBPT (reduz perdas para menos de 10%)."},
    {q:"Por que 1% de MO no solo faz tanta diferença na produção?",ctx:"Solo atual: MO 0,9%, CTC 4,2. Solo de mata vizinha: MO 3,8%, CTC 12 cmolc/dm³.",
    opts:["A. MO é apenas esteticamente bonita — o que importa são os fertilizantes","B. Cada 1% de MO adicional retém 167.000 L a mais de água/ha, aumenta a CTC em 2-4, alimenta 300-500 kg de biomassa microbiana viva/ha","C. MO só regula o pH — sua única função é neutralizar a acidez","D. MO importa apenas para agricultura orgânica"],
    correct:1,xp:30,diff:2,why:"💡 MO = nível máximo do solo! 1% de MO a mais = 167.000 L de água extra por hectare. Para 100ha com 3% vs 1% de MO = diferença de 33 MILHÕES de litros nos anos de seca. Recuperar 1% de MO leva 5-10 anos com SPD, mas começa a ser sentido na 2ª safra."},
    {q:"O filho quer usar subsolador E arado no mesmo ano para 'resolver tudo'. Como você avalia?",ctx:"Solo com 14% umidade. Propriedade endividada em R$120.000. Subsolador: R$220/ha. Arado: R$180/ha.",
    opts:["A. Perfeito — os dois juntos garantem preparo completo","B. Contradição técnica: subsolagem rompe o pé de arado (correto), mas o arado imediatamente recria o problema. É gastar R$400/ha para voltar ao ponto de partida","C. O arado deve vir antes do subsolador","D. Ambos são desnecessários — só calcário resolve"],
    correct:1,xp:32,diff:2,why:"💡 Como no Sonic: abre o caminho (subsolagem) e logo ativa o obstáculo de volta (aração). Correto: subsolagem única + plantio direto permanente. Economia em 5 anos de SPD: R$600-1.200/ha. Para 100ha: até R$120.000 economizados!"},
    {q:"A MO do solo caiu de 4,5% (mata original) para 0,9% em 18 anos. Para 30cm de profundidade e densidade 1,3 g/cm³, quanto carbono por hectare foi perdido?",ctx:"MO inicial 4,5% → COS 2,6%. MO atual 0,9% → COS 0,52%. Área: 120ha.",
    opts:["A. Uns 5-10 t C/ha — impacto irrelevante","B. Perda = (2,6%-0,52%)/100 × 1,3 × 0,30m × 10.000m² = ~81 t C/ha. Em 120ha: ~9.720 t C = ~35.670 t CO₂ emitidas","C. Não é possível calcular sem laboratório especializado","D. A perda de carbono é compensada pelos minerais — troca neutra"],
    correct:1,xp:42,diff:3,why:"💡 9.720 t C × R$120/t CO₂ (mercado voluntário) = R$4,3 MILHÕES em carbono que a terra emitiu! Recuperar esse carbono com SPD geraria créditos de R$200.000-500.000 ao longo de 10 anos. A degradação tem um preço — e a recuperação tem um prêmio."},
    {q:"Qual a diferença prática entre calagem (calcário) e gessagem (gesso agrícola) para corrigir solo ácido com alumínio tóxico no subsolo?",ctx:"Solo pH 4,8 na superfície. Al³⁺ = 1,8 cmolc/dm³ a 40cm. Raízes de soja precisam chegar a 80cm.",
    opts:["A. São a mesma coisa — ambos corrigem pH e alumínio em todo o perfil","B. Calcário: mobilidade 2-3cm/ano, só corrige a superfície. Gesso (CaSO₄): solúvel, migra em profundidade — neutraliza Al³⁺ no subsolo e deixa Ca²⁺ disponível. Os dois juntos são indispensáveis","C. Gesso substitui o calcário completamente","D. Calcário corrige o subsolo mais rápido por ser mais pesado"],
    correct:1,xp:36,diff:3,why:"💡 Sem gesso, o calcário leva 15-20 anos para chegar a 40cm. Com gesso (500-800 kg/ha), o SO₄²⁻ migra em semanas e neutraliza o Al³⁺ no subsolo. Resultado: raízes chegam de 30-40cm para 80-100cm. Cada 10cm a mais = acesso a 2-3mm de água extra = 1-2 semanas a mais de resistência à seca!"},
    {q:"BOSS FASE 1: Seu Raimundo quer fazer o CAR. Ele tem 120ha lavoura, 25ha pastagem, 8ha mata ciliar (córrego 12m largura), 15ha vegetação em topo de morro e 2ha açude. Há deficit de APP?",ctx:"Código Florestal Lei 12.651/2012. Bioma Cerrado fora da Amazônia Legal.",
    opts:["A. Está regularizado — 8ha de mata ciliar e 15ha no topo de morro cobrem tudo","B. Precisa de levantamento geodésico: córrego de 12m exige 50m de APP em cada margem (Art. 4°). O técnico NUNCA assina laudo sem dados completos e georreferenciados","C. Propriedades menores que 200ha são isentas de APP","D. Apenas açude e mata ciliar contam como APP"],
    correct:1,xp:45,diff:4,why:"💡 Rios de 10 a 50m de largura exigem 50m de APP em CADA margem (Art. 4°, I, Lei 12.651/2012). Para saber se os 8ha cobrem a exigência, preciso do comprimento total do córrego — isso exige levantamento geodésico. ART assinada em laudo incorreto = processo no CREA. Responsabilidade profissional em primeiro lugar!"},
  ]},
  {id:2,title:"World 2-1: A Sede da Terra",subtitle:"Água & Irrigação",icon:"💧",world:"MUNDO 2",color:"#1A3A6B",accent:"#60CFFF",
  story:"LEVEL UP! Dona Marlene tem 3ha de horticultura irrigada. 90 dias sem chuva. O boss dessa fase é a SECA — e ela não tem piedade!",
  questions:[
    {q:"Dona Marlene irriga ao meio-dia, 37°C, mangueirão na mão. O tensiômetro marca 8 kPa a 15cm. Ela aplica 8mm por dia. O que o tensiômetro indica?",ctx:"ET₀ dia: 7,2mm. Kc alface: 0,95. Eficiência da mangueira: 45-50%. Capacidade de campo: tensão 10 kPa.",
    opts:["A. Solo com deficit severo — irrigar urgente com o dobro","B. Solo quase saturado (8 kPa próximo da CC de 10 kPa) — Dona Marlene está desperdiçando água. Ao meio-dia 40-60% evapora antes de atingir as raízes","C. Tensiômetro quebrado — tensão impossível","D. Solo no ponto ideal — manter o mesmo manejo"],
    correct:1,xp:30,diff:2,why:"💡 Tensiômetro 8 kPa = solo quase saturado. Irrigar mais agora = asfixia radicular + dinheiro no ralo. Ao meio-dia em 37°C, a mangueira joga água no ar — 40-60% evapora antes de chegar às raízes. Gotejamento tem 90-95% de eficiência vs 45-50% da mangueira. O payback do gotejamento é de 2-3 safras."},
    {q:"A outorga de irrigação de Dona Marlene venceu há 2 anos. O fiscal da SEMA aparece. Como fica a situação legal?",ctx:"Lei 9.433/1997. Captação: 2,5 L/s do ribeirão. Período de estiagem com restrição declarada.",
    opts:["A. Outorga vencida não é problema grave — renovar depois","B. Infração grave: captação sem outorga válida em restrição pode resultar em multa de R$10.000 a R$10 milhões, embargo imediato e bloqueio de crédito rural","C. Pequena propriedade rural é isenta de outorga","D. O técnico não tem responsabilidade — culpa é só do produtor"],
    correct:1,xp:35,diff:3,why:"💡 Lei 9.433/1997: água é bem público, uso econômico acima de 0,5 L/s exige outorga. Em seca severa, hierarquia: 1º abastecimento humano, 2º dessedentação animal, 3º irrigação. Penalidades: multa R$10k-R$10M + embargo + bloqueio de PRONAF. O técnico com ART no projeto tem responsabilidade solidária!"},
    {q:"Calcule a lâmina bruta de irrigação para alface: ET₀ = 6,8mm, Kc = 0,95, chuva efetiva = 2mm, eficiência gotejamento = 92%.",ctx:"Capacidade de campo: 10 kPa. Tensiômetro atual: 28 kPa — próximo do limite de estresse da alface (30-35 kPa).",
    opts:["A. Lâmina bruta = ET₀ diretamente = 6,8mm","B. ETc = 6,8 × 0,95 = 6,46mm. Lâmina líquida = 6,46 - 2 = 4,46mm. Lâmina bruta = 4,46 / 0,92 = 4,85mm a aplicar","C. Lâmina = Kc / ET₀ = 0,14mm","D. Com chuva de 2mm, não precisa irrigar hoje"],
    correct:1,xp:40,diff:3,why:"💡 O cálculo passo a passo: ET₀ (referência) × Kc (ajuste para a cultura) = ETc (necessidade real). Subtrair chuva efetiva = déficit a repor. Dividir pela eficiência = quanto aplicar de fato. App gratuito Irriger (Embrapa) faz esse cálculo automaticamente para qualquer cultura!"},
    {q:"Uma nascente secou progressivamente em 3 anos. A pluviometria local não mudou. Qual é a causa real?",ctx:"Precipitação 10 anos: estável, 1.050mm/ano. Cobertura florestal no raio de 500m da nascente: caiu de 65% para 28% em 12 anos. Solo compactado por pastejo excessivo (>3MPa).",
    opts:["A. Mudança climática global — aquecimento causa todas as secas","B. Desmatamento e compactação na área de recarga: sem floresta 'esponja', a infiltração caiu drasticamente. A chuva é a mesma, mas a recarga do aquífero despencou 70-75%","C. Extração excessiva por poços artesianos","D. Ciclo natural de secas independente do uso do solo"],
    correct:1,xp:38,diff:3,why:"💡 A evidência decisiva: mesma chuva, nascente seca. Floresta infiltra 120-180mm/h; pastagem compactada infiltra 8-25mm/h. De 65% para 28% de floresta na área de recarga = queda de 51% na capacidade de infiltração = mais escoamento = menos recarga = nascente seca. Código Florestal: APP de 50m ao redor de nascentes é obrigatória exatamente para proteger essa função!"},
    {q:"Análise da água de irrigação: CE = 1,8 dS/m, RAS = 8,2. Dona Marlene quer irrigar alface. Qual o diagnóstico?",ctx:"Limiar de tolerância da alface à salinidade: CE = 1,3 dS/m. RAS > 9 = problema sério de sodicidade.",
    opts:["A. Água de boa qualidade — sem restrições","B. CE 1,8 dS/m supera o limiar da alface (1,3) — risco de 10-20% de redução. RAS 8,2 indica risco de sodicidade progressiva do solo. Recomendar culturas mais tolerantes ou lixiviação periódica","C. Só o pH é problemático — corrigir com ácido resolve tudo","D. Qualquer qualidade de água serve para irrigação"],
    correct:1,xp:35,diff:3,why:"💡 Salinidade age como veneno lento: cada irrigação deposita sal. Com CE 1,8 dS/m irrigando diariamente, em 2-3 meses o solo pode ter CE 3,6-7,2 dS/m — perda de 30-60% na alface. Solução: gesso agrícola (1-2 t/ha) para competir com Na⁺ + substituir alface por beterraba (limite 8 dS/m) ou espinafre (5 dS/m)."},
    {q:"Você propõe gotejamento para Dona Marlene (3ha tomate, custo R$28.000). Ela resiste: 'Caro demais!' Faça a análise econômica.",ctx:"Consumo atual: 180m³/dia. Energia bombeamento: R$1.200/mês. Ciclo tomate: 120 dias. PRONAF Eco disponível.",
    opts:["A. Concordar — gotejamento é caro demais para pequenos produtores","B. Com gotejamento: consumo cai 47%, energia -40% (R$480/mês), produtividade tomate +18-25%, menos fungos foliares. Ganho total: R$42.000-65.000/safra. Payback em 2-3 safras. PRONAF Eco financia a 3,5% a.a.","C. Gotejamento só tem escala acima de 50ha","D. Mudar só o horário de irrigação economiza suficientemente"],
    correct:1,xp:38,diff:3,why:"💡 Economia energia: R$480/mês × 4 meses = R$1.920/safra. Ganho produtividade: 33-54 t extras × R$1.200/t = R$39.600-64.800. Total: R$41.826-67.026/safra. Custo gotejamento: R$28.000. Payback em menos de 1 safra! É como encontrar um portal no Mario — um investimento que abre o próximo mundo."},
    {q:"Como dimensionar uma cisterna calçadão para irrigar 0,5ha de hortaliças por 60 dias de seca (lâmina: 5mm/dia)? Calçadão: 500m², chuva antes da seca: 150mm, eficiência: 80%.",ctx:"Área irrigada: 5.000m².",
    opts:["A. 15.000L (padrão P1MC) são suficientes","B. Necessidade: 5mm/dia × 5.000m² × 60 dias = 1.500.000L. Captação: 500m² × 0,15m × 0,80 = 60.000L. A cisterna cobre apenas 4% — precisa de fontes complementares (açude, barraginhas, poço)","C. 500.000L calculando apenas a área irrigada","D. Com 150mm de chuva antes da seca, a cisterna cobre tudo"],
    correct:1,xp:42,diff:4,why:"💡 Esse cálculo honesto é essencial: cisternas são ótimas para abastecimento HUMANO (16.000L do P1MC atendem 4 pessoas por 8 meses) mas insuficientes para irrigação comercial. Para o déficit real de 1.440.000L, combinar: barraginhas de nível + cisterna + poço com proteção de nascente."},
    {q:"O prefeito quer construir um açude (200.000m³) represando o ribeirão. Quais os instrumentos legais obrigatórios?",ctx:"APP a ser inundada: ~4ha. Comunidade quilombola usa o ribeirão para pesca 500m a jusante.",
    opts:["A. Açude de prefeitura não precisa de licença — é obra pública","B. Obrigatório: LP+LI+LO (licenciamento ambiental), outorga hídrica, autorização para supressão de APP, consulta prévia à comunidade quilombola (Convenção 169 OIT + Art. 68 ADCT). Obras sem licença são embargadas e demolidas","C. Basta aprovação da Câmara Municipal","D. Licença ambiental só para açudes acima de 10 milhões m³"],
    correct:1,xp:42,diff:4,why:"💡 A consulta à comunidade quilombola é direito constitucional (Art. 68 ADCT) e obrigação da Convenção 169 da OIT (ratificada pelo Brasil em 2002). Ignorar pode resultar em suspensão judicial permanente da obra. Caso real: UHE Belo Monte levou 15 anos por disputas de licenciamento!"},
    {q:"O tanque Classe A registrou evaporação de 8mm/dia. Kc do tomate (frutificação): 1,15. Kt = 0,75. Chuva efetiva semanal: 18mm. Eficiência gotejamento: 92%. Qual a lâmina bruta semanal?",ctx:"Tanque Classe A instalado na fazenda.",
    opts:["A. Lâmina semanal = 8mm × 7 dias = 56mm","B. ET₀/dia = 8 × 0,75 = 6mm. ETc/dia = 6 × 1,15 = 6,9mm. ETc semana = 48,3mm. Lâmina líquida = 48,3 - 18 = 30,3mm. Lâmina bruta = 30,3 / 0,92 = 32,9mm","C. Lâmina = Kc / ET₀ = 0,19mm","D. Com 18mm de chuva, não precisa irrigar"],
    correct:1,xp:40,diff:3,why:"💡 ET₀ = Tanque × Kt (converte evaporação do tanque em ET de referência). ETc = ET₀ × Kc (ajusta para a cultura e estágio). Chuva efetiva desconta a necessidade. Dividir pela eficiência = quanto aplicar de fato. O app Irriger da Embrapa automatiza esse cálculo gratuitamente!"},
    {q:"BOSS FASE 2: Elabore um Plano Básico de Uso Racional da Água para uma microbacia de 500ha, 12 produtores, déficit de 6 meses/ano. Quais são as 5 etapas essenciais?",ctx:"Precipitação: 1.050mm/ano. Demanda irrigação: 2,1M m³/ano. Capacidade açudes: 380.000m³.",
    opts:["A. Elaborar relatório técnico individual sem consultar a comunidade","B. 5 etapas: (1) Diagnóstico hídrico quantitativo, (2) Mobilização de todos os usuários, (3) Priorização de usos — humano primeiro, (4) Ações de conservação e eficiência hídrica, (5) Criação de comitê local com monitoramento contínuo","C. Construir mais açudes — o problema é só armazenamento","D. Proibir toda irrigação até normalizar"],
    correct:1,xp:50,diff:5,why:"💡 Diagnóstico: 2,1M m³ de demanda vs. 380.000m³ de capacidade = déficit de 82%. Açudes novos não resolverão sozinhos. Solução real: 50 barraginhas (+500.000-1M m³ de recarga) + gotejamento em todas as propriedades (-45% demanda) + recuperação de 15ha de mata nativa em cabeceiras (+40-60% infiltração). Custo total: ~R$450.000 vs. novos açudes que custariam R$2-3M com menor eficiência!"},
  ]},
  {id:3,title:"World 3-1: A Tentação do Adubo",subtitle:"Fertilizantes & Nutrição",icon:"⚗️",world:"MUNDO 3",color:"#1A5E20",accent:"#A9FF6D",
  story:"POWER-UP! Kaique herdou 80ha e quer ser o maior produtor da região: 'Vou passar fertilizante até o solo pedir arrego!' Use sua ciência para convencê-lo que excesso é dinheiro no lixo.",
  questions:[
    {q:"Kaique quer 400 kg/ha de ureia de uma vez no milho. Qual o risco técnico principal?",ctx:"Solo arenoso (20% argila), pH 6,2. Chuva prevista: 45mm em 3 dias. Dose recomendada: 160 kgN/ha.",
    opts:["A. Não há risco — o solo armazena o excesso de N","B. Solo arenoso + chuva = lixiviação do NO₃⁻ para o lençol freático + salinização que queima raízes. Custo: R$1.280 vs R$512 na dose correta. Parcelamento: 1/3 plantio + 2/3 em V4-V6 eleva eficiência de 40% para 70%","C. O único risco é crescimento vegetativo excessivo","D. Aplicação única é recomendada para simplificar"],
    correct:1,xp:30,diff:2,why:"💡 NO₃⁻ é ânion — o solo não o retém. Em solos arenosos, 45mm de chuva lixivia o nitrato além dos 60cm das raízes em V1-V3. Custo da perda: R$640 jogados fora. O parcelamento sincroniza a disponibilidade com a demanda máxima do milho (V6 ao VT — florescimento)."},
    {q:"Análise foliar do milho em V6 mostra deficiência de Zn. A análise de solo mostra 1,8 mg/dm³ de Zn (acima do crítico). Como explicar essa contradição?",ctx:"pH do solo: 6,9 (pós-calagem excessiva). P: 48 mg/dm³ (muito alto).",
    opts:["A. O laboratório errou — se tem Zn no solo, a planta absorve","B. pH 6,9 precipita o Zn em formas insolúveis (disponível em pH 5,0-6,5). Excesso de P precipita Zn como ZnHPO₄ — antagonismo P×Zn clássico. Solução: ZnSO₄ foliar + ajustar pH para 6,0-6,3","C. Deficiência de Zn é causada exclusivamente por temperatura baixa","D. Aumentar adubo fosfatado forçará absorção de Zn"],
    correct:1,xp:35,diff:3,why:"💡 O pH é o master controller da disponibilidade de micronutrientes. Acima de pH 6,5, Zn, Mn, Fe e Cu formam compostos insolúveis. Com P > 30-40 mg/dm³, o P e o Zn competem pelos mesmos transportadores na membrana radicular. Lição: supercalcificação e superfosforização criam deficiências mascaradas!"},
    {q:"Kaique quer misturar ureia + superfosfato simples (SFS) + KCl numa mesma operação. O técnico da cooperativa disse que 'pode misturar tudo'. Como você avalia?",ctx:"SFS: contém H₃PO₄ livre, pH ácido, umidade. Temperatura: 34°C, umidade relativa: 72%.",
    opts:["A. Pode misturar — fertilizantes são todos iguais","B. Ureia + SFS = INCOMPATÍVEL: H₃PO₄ do SFS reage com ureia, liberando NH₃ (perda de N), aquecimento, empedramento em horas. Usar Superfosfato Triplo (SFT) no lugar do SFS resolve","C. Problemático apenas com mais de 24h de antecedência","D. O problema ocorre só abaixo de 20°C"],
    correct:1,xp:33,diff:3,why:"💡 H₃PO₄ livre do SFS + ureia → NH₄H₂PO₄ + NH₃↑. A amônia liberada perde N e pode causar fitotoxicidade na germinação. A tabela de compatibilidade da ANDA/Embrapa lista 47 combinações problemáticas. Alternativa: SFT no lugar do SFS (sem H₃PO₄ livre) + compatível com ureia por até 24h."},
    {q:"Um rio vizinho ficou verde-fluorescente após a safra de Kaique. P-total = 0,8 mg/L (padrão CONAMA: 0,1), OD = 2,1 mg/L (mínimo: 5,0), cianobactérias Microcystis. O que ocorreu?",ctx:"Kaique aplicou 180 kg P₂O₅/ha por 5 anos (recomendado: 60-80 kg/ha). P-disponível no solo: 52 mg/dm³.",
    opts:["A. A coloração verde é natural das algas — sem relação com a adubação","B. Eutrofização: solo saturado de P libera fósforo para o escoamento que chega ao rio. P+N alimentam cianobactérias, que consomem O₂. OD 2,1 mg/L = morte de peixes iminente. Kaique tem responsabilidade civil — multa de R$10k a R$50M","C. Eutrofização causada pelo esgoto urbano","D. Microcystis indica boa qualidade da água"],
    correct:1,xp:38,diff:4,why:"💡 Ciclo do desastre: adubação > necessidade → P acumula → P lixivia quando solo saturado (>40-50 mg/dm³) → chega ao rio → bloom de cianobactérias → hipóxia → peixes morrem → microcistina contamina a água. Lei 9.605/98: poluição causando mortandade de animais = crime ambiental com pena de 1-5 anos + multa!"},
    {q:"Kaique quer substituir 100% da adubação mineral por biofertilizante líquido (esterco fermentado). Como avaliar tecnicamente?",ctx:"Biofertilizante típico: N=0,12%, P₂O₅=0,04%, K₂O=0,09%. Soja em 80ha exige ~5.000 kg P₂O₅/ano.",
    opts:["A. O YouTube está certo — biofertilizante substitui completamente o mineral","B. Concentração 10-50x menor que os minerais. Para suprir só o P em 80ha: precisaria de mais de 16 MILHÕES de litros — logisticamente inviável. É excelente como complemento (hormônios, microrganismos), mas não substitui","C. Biofertilizante fermentado 30 dias tem composição idêntica ao NPK mineral","D. Todo produto natural tem validação científica implícita"],
    correct:1,xp:36,diff:3,why:"💡 Os números reais: biofertilizante tem 0,04% P₂O₅. Para suprir 5.000 kg P₂O₅ em 80ha: 5.000 / (0,04/100) = 12.500.000 kg necessários. Inviável! O que biofertilizante REALMENTE faz bem: fornece reguladores de crescimento (auxinas), introduz microrganismos benéficos e aumenta biodisponibilidade de micronutrientes. Use os dois — não escolha um!"},
    {q:"Análise de solo retornou: P = 35 mg/dm³ (alto), K = 220 mg/dm³ (alto). O técnico da cooperativa quer aplicar a mesma dose do ano passado 'por garantia'. Como orientar?",ctx:"Soja, 60 sc/ha esperadas. Exportação: 16 kg P₂O₅/ha e 14 kg K₂O/ha para 60 sc/ha.",
    opts:["A. Manter a mesma dose do ano passado 'para garantir'","B. Com P e K em teores altos, adubar apenas a exportação da cultura: 16 kg P₂O₅/ha e 14 kg K₂O/ha. Redução de 80% na dose. Economia: ~R$420/ha sem perda de produtividade","C. Teores altos dispensam adubação por 10 anos","D. Teores altos significam que a soja vai absorver mais — aumentar a dose"],
    correct:1,xp:40,diff:4,why:"💡 Adubação CORRETIVA (eleva o teor) vs. MANUTENÇÃO (repõe a exportação). Com P = 35 mg/dm³ (ALTO), aplicar 80 kg P₂O₅/ha = R$192/ha sem retorno. Adubação de manutenção correta: 16 kg = R$38/ha. Economia: R$154/ha × 80ha = R$12.320/safra. Em 5 anos: R$61.600. ROI da análise de solo: 96:1!"},
    {q:"O que é a lei do mínimo de Liebig e como ela deve guiar a adubação de Kaique?",ctx:"Solo com pH ótimo, P e K adequados, mas N muito baixo. Kaique quer aplicar mais P e K 'para garantir'.",
    opts:["A. Aplicar o mínimo possível de fertilizante para economizar","B. A produção é limitada pelo nutriente mais escasso — adicionar P e K sem suprir N não aumenta produtividade. Análise de solo e foliar identificam o 'nutriente limitante'. Adubar sem diagnóstico é o principal motivo de desperdício","C. Nutrientes em excesso são armazenados pelo solo para safras futuras","D. O lucro mínimo é garantido com adubação máxima"],
    correct:1,xp:32,diff:2,why:"💡 Liebig (1840): a produção vegetal é limitada pelo nutriente em menor quantidade relativa — como o barril furado pela tábua mais curta. Adicionar N sem suprir P ou K não aumenta produtividade. Análise de solo e foliar identificam o nutriente limitante. Adubação sem diagnóstico = os produtores aplicam 3-5x mais insumos do que a planta consegue aproveitar!"},
    {q:"Kaique descobre o mercado de carbono e quer vender créditos pelo plantio direto dos 80ha. Como funciona o processo e qual a renda estimada?",ctx:"SPD por 5 anos: sequestro estimado 0,5-1,0 t C/ha/ano = 1,8-3,7 t CO₂eq/ha/ano. Preço médio: USD 12/t. Câmbio: R$5,20.",
    opts:["A. Mercado de carbono é fraude — sem remuneração real para agricultores","B. 80ha × 2,75 t CO₂eq médio × USD 12 × R$5,20 = R$13.728/ano bruto. Menos custo MRV R$8.000 = R$5.728/ano líquido. Em projeto coletivo: ~R$10.500/ano. Exige: documentação de práticas, análise de solo anual, auditoria terceira","C. Apenas empresas industriais participam","D. O Brasil não participa de mercados de carbono"],
    correct:1,xp:42,diff:4,why:"💡 O mercado voluntário de carbono cresceu 400% de 2019-2023 no Brasil. Certificadoras: Verra (VCS), Gold Standard. MRV (Monitoramento, Relato, Verificação): documentar insumos + práticas + análises de solo + auditoria terceira. Para pequenos produtores: projetos coletivos diluem o custo de certificação. Renda extra de R$5.000-10.000/ano sem mudar nada no que já faz!"},
    {q:"BOSS FASE 3: Kaique quer acessar o Plano ABC+ para financiar a transição para práticas sustentáveis. Quais elementos são obrigatórios no projeto técnico?",ctx:"ABC+ (2020-2030). R$8 bilhões disponíveis. Kaique tem 80ha, CAR ativo, PRONAF.",
    opts:["A. Basta carta de intenção assinada","B. Obrigatórios: (1) diagnóstico georreferenciado, (2) linha de base de emissões de GEE (IPCC Tier 2), (3) metas quantificáveis de redução, (4) cronograma com marcos verificáveis, (5) sistema MRV detalhado, (6) ART do responsável técnico (CREA)","C. Apenas CAR ativo e DAP são suficientes","D. Planos coletivos não são aceitos — cada produtor deve apresentar individualmente"],
    correct:1,xp:48,diff:5,why:"💡 O ABC+ financia: SPD, recuperação de pastagem, iLPF, florestas, FBN, biogás. A linha de base de emissões usa planilhas Embrapa/MAPA (disponíveis em embrapa.br/abc). MRV anual: satélite Sentinel-2 + análise de solo a cada 2 anos + relatório ao banco. PRONAF Eco: até R$165.000 a 3,5% a.a. em 8 anos. ART registrada no CREA é indispensável!"},
  ]},
  {id:4,title:"World 4-1: O Rio Agonizante",subtitle:"Recursos Hídricos",icon:"🏞️",world:"MUNDO 4",color:"#0D3B6E",accent:"#38BDF8",
  story:"ALERT NÍVEL 4! O Rio Canindé está em colapso. IBAMA e MP te convocaram. 7 dias para laudo técnico completo. Câmeras de TV lá fora. Sem errar!",
  questions:[
    {q:"Turbidez do rio: 820 NTU (padrão CONAMA: 100 NTU). Como determinar tecnicamente a contribuição de cada propriedade a montante?",ctx:"Propriedade A (120ha, solo exposto): 68% estimado. Propriedade B (80ha, 30% cobertura): 22%. Propriedade C (60ha, mata ciliar): 10%.",
    opts:["A. Impossível — o rio mistura tudo","B. Modelo RUSLE: A = R×K×LS×C×P. Com C=0,50 (solo exposto) vs C=0,01 (mata ciliar), a erosão é 50x maior em A que em C para as mesmas condições físicas. Satélite Sentinel-2 (gratuito) + dados de campo quantifica cada contribuição","C. A culpa é sempre da propriedade maior","D. Turbidez alta em rios é fenômeno natural"],
    correct:1,xp:35,diff:3,why:"💡 RUSLE (Revised Universal Soil Loss Equation): A (t/ha/ano) = R×K×LS×C×P. O fator C (cobertura) é determinante: solo exposto tem C=0,50 vs mata ciliar com C=0,01 — erosão 50x maior. Ferramentas gratuitas: QGIS + imagens Sentinel-2 + dados INMET. O laudo técnico baseado em RUSLE tem validade judicial!"},
    {q:"Poço da comunidade quilombola: Atrazina = 4,8 μg/L (limite: 2 μg/L), Nitrato = 28 mg/L (limite: 10 mg/L). Qual a gravidade e o protocolo?",ctx:"Atrazina proibida no Brasil desde 2019. Comunidade tem 3 bebês menores de 6 meses.",
    opts:["A. Valores próximos do limite — monitorar sem urgência","B. EMERGÊNCIA em saúde pública: atrazina proibida 2,4x acima do limite (uso ilegal = crime ambiental). Nitrato 2,8x acima = risco IMEDIATO de metahemoglobinemia em bebês. Suspender uso + distribuir água potável + acionar Vigilância Sanitária + MP","C. Os pesticidas foram depositados por avião — sem relação com as fazendas vizinhas","D. Concentrações em μg/L são partes por bilhão — preocupação exagerada"],
    correct:1,xp:40,diff:4,why:"💡 Metahemoglobinemia (síndrome do bebê azul): NO₃⁻ convertido a NO₂⁻ no intestino de bebês de 0-6 meses oxida a hemoglobina, impedindo transporte de O₂. Com 3 bebês na comunidade, é emergência médica IMEDIATA. Atrazina detectada pós-2019 = crime ambiental federal em andamento. Dever ético e legal de notificar imediatamente!"},
    {q:"Você precisa recuperar 3km de mata ciliar (30ha total). Solo moderadamente degradado, banco de sementes ativo nas bordas. Orçamento: R$80.000.",ctx:"Custos: regeneração natural conduzida R$800/ha; semeadura direta R$1.200/ha; plantio de mudas R$5.000/ha.",
    opts:["A. Plantar mudas nativas em toda a área","B. Estratégia escalonada: regeneração natural nos 18ha com banco de sementes ativo (R$14.400) + semeadura direta nos 8ha intermediários (R$9.600) + mudas nos 4ha mais degradados (R$20.000) = R$44.000 total — dentro do orçamento","C. Plantar eucalipto — mais rápido e cobre a APP legalmente","D. Cercar e aguardar 20 anos"],
    correct:1,xp:38,diff:3,why:"💡 CONAMA Resolução 429/2011 reconhece 3 métodos: (1) Condução da regeneração natural — o mais barato, funciona onde o banco de sementes está ativo. Só precisa cercar e roçar a braquiária; (2) Semeadura direta de espécies pioneiras; (3) Plantio de mudas — mais caro e confiável em áreas muito degradadas. A estratégia escalonada economiza R$36.000 vs. plantio de mudas em toda a área!"},
    {q:"Um frigorífico clandestino despeja efluente DBO₅ = 2.400 mg/L a 2 L/s no rio (vazão: 0,5 m³/s, DBO natural: 2,5 mg/L). Calcule o impacto.",ctx:"Padrão CONAMA DBO Rio Classe 2: < 5 mg/L. Fórmula: DBO_mistura = (Q_ef × DBO_ef + Q_rio × DBO_rio) / Q_total.",
    opts:["A. 2 L/s em 0,5 m³/s é desprezível","B. DBO_mistura = (0,002×2400 + 0,5×2,5) / 0,502 = 12,04 mg/L — 2,4x acima do padrão. Reduzirá OD abaixo de 4 mg/L em 2-3 km a jusante — zona de mortandade de peixes","C. Efluente de frigorífico é natural — não causa poluição técnica","D. O rio tem capacidade de autodepuração ilimitada"],
    correct:1,xp:42,diff:4,why:"💡 O modelo de Streeter-Phelps: efluente rico em DBO → microrganismos consomem O₂ → OD cai → zona anóxica → decomposição anaeróbia → H₂S + NH₃ + cheiro de ovo podre → peixes morrem. DBO mistura 12 mg/L cria zona anóxica em 2-3km a jusante. Lei 9.605/98: lançamento sem licença + crime ambiental = pena 1-5 anos + multa de até R$50M!"},
    {q:"Como provar que o desmatamento das margens (e não as mudanças climáticas) causou o aumento de turbidez, se a pluviometria não mudou?",ctx:"Pluviometria 10 anos: estável, 1.100mm/ano. Cobertura florestal marginal: de 72% para 31% em 8 anos. Taxa de infiltração: floresta 150mm/h, solo exposto 12mm/h.",
    opts:["A. Impossível provar — mudanças climáticas e desmatamento têm efeitos idênticos na turbidez","B. A chave é que a pluviometria NÃO MUDOU mas a turbidez aumentou 8x. Chuva igual + infiltração 12x menor (floresta vs solo exposto) = 8-12x mais escoamento superficial carregando sedimentos. Correlação temporal desmatamento-turbidez completa o argumento causal","C. A chuva intensificou mesmo que a média seja igual","D. Não é possível esse diagnóstico sem 20 anos de dados"],
    correct:1,xp:38,diff:3,why:"💡 Raciocínio científico: variável independente (chuva) constante + variável intermediária (cobertura florestal) muda → variável dependente (turbidez) muda. De 72% para 31% de floresta: capacidade de infiltração caiu de 113mm/h para 55mm/h médios na bacia — queda de 51% = aumento proporcional no escoamento = mais sedimentos = mais turbidez."},
    {q:"O Comitê de Bacia quer criar um PSA hídrico. Como calcular o valor do serviço ambiental das nascentes preservadas?",ctx:"8 propriedades com APP em bom estado reduzem 4.200 t de sedimentos/ano. Custo atual de tratamento da ETA: R$0,80/m³. Custo sem APP preservada: R$1,50/m³. Consumo da prefeitura: 500.000 m³/ano.",
    opts:["A. PSA é conceito teórico sem valor monetário mensurável","B. Custo evitado: R$0,70/m³ × 500.000m³/ano = R$350.000/ano de economia. Esse valor pode remunerar os 8 produtores conservadores em R$43.750/ano cada — proporcional à área de APP preservada","C. PSA só é viável com investimento mínimo de R$1 milhão inicial","D. Produtores não deveriam receber para cumprir obrigação legal"],
    correct:1,xp:40,diff:4,why:"💡 PSA hídrico é regulamentado pela Lei 14.119/2021. O Programa Produtor de Água da ANA implementou em 42 bacias com resultados documentados: redução de 40-70% na turbidez e aumento de 20-45% na vazão mínima. A lógica econômica: cada R$1 em PSA economiza R$5-15 em tratamento de água — o usuário ganha mais do que gasta pagando o produtor!"},
    {q:"Quais instrumentos jurídico-ambientais podem ser usados pelo MP para forçar a recuperação da bacia?",ctx:"3 propriedades com passivo de APP. 1 frigorífico clandestino. 1 caso de uso de atrazina pós-2019. Dano ambiental estimado: R$2,3 milhões.",
    opts:["A. MP só pode agir com queixa-crime formal dos moradores","B. Instrumentos: (1) TAC — Termo de Ajustamento de Conduta (extrajudicial, rápido, para APP); (2) ACP — Ação Civil Pública (judicial, para dano coletivo); (3) Ação Penal para frigorífico e atrazina (ação pública incondicionada); (4) Auto de Infração IBAMA; (5) PRA para regularização das APPs","C. Apenas o Poder Judiciário pode intervir — MP não tem competência ambiental","D. Só resta esperar recuperação voluntária"],
    correct:1,xp:50,diff:5,why:"💡 TAC vs ACP: o TAC é o instrumento preferencial — o poluidor assume compromissos com cronograma e multa diária por descumprimento, sem processo judicial lento. ACP (Lei 7.347/85): MP age de ofício para danos coletivos. Ação penal para atrazina: crime de ação pública incondicionada — MP age sem necessidade de queixa do cidadão!"},
    {q:"Como calcular a carga poluidora mensal de nitrogênio das lavouras para o Rio Canindé?",ctx:"Área lavouras: 2.800ha. Taxa de exportação de N: 8 kgN/ha/ano. Vazão média mensal: 850.000 m³/mês. Capacidade de autodepuração: 2 mg N/L.",
    opts:["A. Impossível calcular cargas difusas","B. Carga mensal: 2.800ha × 8 kgN/ha/ano / 12 = 1.867 kgN/mês. Concentração: 1.867.000g / 850.000.000L = 2,2 mg/L — acima da capacidade de autodepuração de 2 mg/L. O rio está no limite e qualquer evento de chuva intensa ultrapassa a capacidade","C. Só fontes pontuais podem ser calculadas","D. Basta dividir a adubação total pelo volume do rio"],
    correct:1,xp:45,diff:5,why:"💡 O rio operando a 110% de sua capacidade de autodepuração = equilíbrio instável. Qualquer perturbação (chuva intensa na época de adubação) dispara eutrofização. Para trazer para <2 mg/L: reduzir exportação de N de 8 para <3 kgN/ha/ano via cobertura do solo 80%+ e matas ciliares como biofiltros. Isso reduziria a concentração para 0,82 mg/L — com folga de 60%!"},
    {q:"BOSS FASE 4: Como você estrutura o laudo técnico pericial para responsabilizar os poluidores do Rio Canindé juridicamente?",ctx:"Três fontes poluidoras identificadas. Necessidade de provas que sustentem ação civil pública.",
    opts:["A. Laudo técnico é apenas formalidade — o MP decide por experiência","B. Estrutura do laudo pericial: (1) Identificação e qualificação do perito + ART; (2) Descrição metodológica (RUSLE, Streeter-Phelps, análises laboratoriais com cadeia de custódia); (3) Quantificação do dano em área, volume e valor (R$); (4) Nexo causal entre cada fonte e o dano; (5) Referências normativas (CONAMA, Lei 9.605/98); (6) Conclusões e recomendações técnicas","C. Basta uma foto do rio poluído e o nome dos proprietários","D. Laudos técnicos não têm validade judicial sem aprovação do IBAMA"],
    correct:1,xp:50,diff:5,why:"💡 O laudo pericial é a espinha dorsal da ação judicial. A cadeia de custódia das amostras é fundamental: cada amostra precisa ser coletada com testemunha, lacrada, identificada com código único, transportada em caixa refrigerada e entregue ao laboratório acreditado pelo INMETRO dentro do prazo de validade. Sem cadeia de custódia correta, as provas podem ser descartadas pelo juiz. O técnico que elabora o laudo tem responsabilidade civil e pode ser chamado como testemunha perante o tribunal!"},
  ]},
  {id:5,title:"World 5-1: A Soja da Discórdia",subtitle:"Monocultura & MIP",icon:"🌱",world:"MUNDO 5",color:"#4A1D6B",accent:"#E879F9",
  story:"COMBO ATIVADO! 30 produtores furiosos numa assembleia. 15 anos de soja. Ferrugem resistente. Nematoide explodido. Técnico rival: 'mais agrotóxico'. Você tem 20 minutos e dados para virar o jogo!",
  questions:[
    {q:"A ferrugem asiática exige 6 aplicações de triazol por safra — o dobro de 5 anos atrás. Qual o mecanismo técnico e a solução?",ctx:"Uso do mesmo fungicida (tebuconazol) por 8 anos. Eficácia atual: 35% (era 82% em 2015). Mutação CYP51 resistente em 73% das amostras (MT).",
    opts:["A. Ferrugem ficou mais forte naturalmente — evolução sem relação com o manejo","B. Resistência por seleção: uso do mesmo mecanismo de ação (FRAC G1) por 8 anos selecionou indivíduos com mutação de resistência. Solução: rotação OBRIGATÓRIA de mecanismos de ação + vazio sanitário (60-90 dias sem soja verde)","C. O produto está sendo falsificado pelos distribuidores","D. Ferrugem resistente é problema apenas de grandes produtores"],
    correct:1,xp:38,diff:3,why:"💡 O gene CYP51 codifica a enzima alvo dos triazóis. Mutação L144F (73% dos isolados do MT, 2022) reduz a afinidade do tebuconazol. Com vazio sanitário de 60 dias, o inóculo regional cai 80-95%. Rotação de mecanismos: FRAC G1 → C3+G2 → P3 → retorna ao G1. Nunca usar o mesmo grupo 2 safras seguidas!"},
    {q:"Um produtor desafia: 'MIP é teoria. Tem dado real?' Como você responde?",ctx:"Fazenda Modelo Embrapa Soja (Londrina): Pré-MIP (2015-17): 5,2 aplic./safra, R$620/ha. Pós-MIP (2019-21): 2,1 aplic./safra, R$251/ha. Produtividade: 3,82 → 4,11 t/ha.",
    opts:["A. MIP é teoria acadêmica — lavoura precisa de proteção preventiva sempre","B. Dados comprovam: MIP reduziu aplicações de 5,2 para 2,1/safra (-60%), custo de R$620 para R$251/ha (-59%) E aumentou produtividade de 3,82 para 4,11 t/ha (+7,6%)","C. Esses dados são de condições experimentais — em fazendas reais seriam 80% menores","D. MIP funciona apenas para insetos — ferrugem sempre exige calendário preventivo"],
    correct:1,xp:36,diff:3,why:"💡 O Nível de Ação (NA) é o núcleo do MIP: só aplica quando a população da praga justifica economicamente. Para lagartas na soja: ≥20 lagartas pequenas (<1,5cm) OU ≥10 grandes (>1,5cm) por metro de fileira. Aplicar desnecessariamente mata os inimigos naturais (Trichogramma, parasitoides), levando à explosão da praga na próxima geração — ciclo vicioso que o MIP quebra!"},
    {q:"40% da área tem infestação severa de Heterodera glycines (800 ovos/100g solo). O técnico rival recomenda nematicida. Por que rotação é superior?",ctx:"Custo nematicida: R$320/ha. Eficiência: 30-45% (temporário). Custo de semente resistente a SCN: +R$15/ha.",
    opts:["A. Nematicida é a única solução eficaz para nematoides","B. O nematoide-de-cisto forma CISTOS com 300 ovos — resistentes a nematicidas. Rotação com milho/braquiária/algodão (não-hospedeiros) por 2 safras reduz H. glycines em 60-90% permanentemente. +cultivar resistente: controle de 85-95% ao custo de R$15/ha vs R$320 de nematicida","C. H. glycines se reproduz em qualquer cultura — rotação não funciona","D. Aumentar a dose do nematicida dá eficiência maior"],
    correct:1,xp:40,diff:4,why:"💡 O cisto de H. glycines é uma cápsula de quitina que protege até 300 ovos por até 10-15 anos no solo — nematicida atinge apenas juvenis em movimento, não penetra nos cistos. Eficiência máxima: 45%. Sem hospedeiro (milho, braquiária), os juvenis eclodem mas morrem sem raiz de soja. Em 2 safras, a população cai 60-90%. H. glycines custa R$35 bilhões/ano à soja brasileira!"},
    {q:"Apresente a análise econômica do iLPF para convencer um produtor cético com 100ha. Use dados reais.",ctx:"iLPF (Embrapa/UFMT, 5 anos): custo implantação +R$1.200/ha. Soja iLPF = 4,3 t/ha vs monocultura = 3,6 t/ha (+19%). Renda pecuária: R$380/ha/ano. Eucalipto (7° ano): R$2.800/ha.",
    opts:["A. iLPF é muito complexo para propriedades menores que 500ha","B. Em 7 anos: soja extra (+R$700/ha × 7 = R$4.900/ha) + pecuária (R$380 × 7 = R$2.660/ha) + eucalipto (R$2.800/ha) = R$10.360/ha adicional vs custo de R$1.200/ha. ROI: 763%. Mais: crédito de carbono de R$18.000-30.000/ano para 100ha","C. iLPF só funciona em áreas com irrigação","D. Dados da Embrapa são superestimados — resultados reais são 80% menores"],
    correct:1,xp:42,diff:4,why:"💡 O iLPF é o personagem nível máximo do RPG agrícola — três componentes com habilidades únicas e sinérgicas. Soja: +19% pela microclima mais fresco. Pecuária: pastagem nas entrelinhas = 1,5-2 UA/ha adicionais. Florestal: eucalipto a 7 anos = 150-180m³/ha × R$160/m³. E o carbono (3-5 t CO₂eq/ha/ano × R$60 = R$18k-30k/ano para 100ha) é renda completamente nova!"},
    {q:"Um produtor tem análise de solo boa (pH 6,2, P 28, K 160), mas produtividade estagnada em 52 sc/ha (potencial: 70 sc/ha). Densidade do solo: 1,61 g/cm³. Nematoides: 800 ovos/100g. SDS em 15% da área. Qual o diagnóstico?",ctx:"Limite crítico de compactação: 1,55 g/cm³. Nível de dano de H. glycines: 200 ovos/100g.",
    opts:["A. Com análise de solo boa, o problema é certamente praga aérea","B. Gap de 18 sc/ha tem causas múltiplas: compactação (1,61 > 1,55 g/cm³), nematoides 4x acima do nível de dano, SDS (Fusarium virguliforme favorecido pela compactação) e monocultura longa reduzindo supressividade biológica","C. 52 sc/ha é o máximo para essa região","D. Trocar o cultivar resolverá o gap"],
    correct:1,xp:40,diff:4,why:"💡 O diagnóstico agronômico é como debugar um código: não encontra o bug olhando só o output. Compactação (-5-10 sc/ha), nematoides 4× o nível de dano (-8-14 sc/ha), SDS em 15% da área (-2-4 sc/ha médio). Solução integrada: subsolagem + rotação milho/braquiária + cultivar resistente SCN + Trichoderma/Bacillus no tratamento de sementes."},
    {q:"Como apresentar o 'Custo Total Real de Produção' incluindo custos invisíveis da monocultura para 30 produtores?",ctx:"Monocultura: custo visível R$3.800/ha, produtividade 52 sc × R$140 = R$7.280. Custos invisíveis: nematicida R$320 + fungicidas extras R$430 + herbicida daninhas resistentes R$280 + perda nematoides (15sc × R$70) = R$2.100.",
    opts:["A. Produtores já sabem todos os custos","B. Margem APARENTE: R$3.480/ha. Custos invisíveis: R$2.100/ha. Margem REAL: R$1.380/ha. Com rotação: custos invisíveis caem para R$400, produtividade sobe para 64 sc/ha. Margem real: R$3.200+/ha. Diferença: +R$1.820/ha × 80ha = R$145.600/safra a mais","C. Custos invisíveis não são responsabilidade do produtor","D. Qualquer custo acima de R$200/ha é insignificante"],
    correct:1,xp:42,diff:4,why:"💡 Os custos invisíveis da monocultura são o 'glitch' que drena dinheiro silenciosamente. A lista completa: nematicidas extras + fungicidas para ferrugem resistente + herbicidas para daninhas resistentes (Conyza, Amaranthus) + perda de produtividade por nematoides e compactação. Somados: R$2.100/ha que NUNCA aparecem como 'custo da monocultura' na planilha do produtor!"},
    {q:"Como responder ao argumento 'meu vizinho planta soja há 20 anos e está rico'? Use raciocínio científico.",ctx:"O vizinho tem: 400ha, solo Latossolo argiloso, altitude 900m, iniciou em 1998. O questionante: 80ha, solo arenoso, altitude 450m.",
    opts:["A. O vizinho tem razão — seu exemplo anula todos os dados científicos","B. Viés de confirmação + viés de sobrevivência: você só ouve os que deram certo. O vizinho tem condições completamente diferentes (solo argiloso = maior tamponamento, altitude 900m = menor pressão de ferrugem). Um caso anedótico não refuta evidência estatística de 1.000 propriedades","C. O vizinho certamente está mentindo sobre sua lucratividade","D. Não há argumento técnico contra experiências pessoais de sucesso"],
    correct:1,xp:38,diff:4,why:"💡 Dois vieses clássicos: Confirmação (busca evidências que confirmam a crença prévia) + Sobrevivência (só analisa os que sobreviveram). Mais: os fatores são completamente diferentes. Solo argiloso tem CTC e tamponamento 3x maior. Altitude 900m = temperatura 3-5°C menor = condições subótimas para ferrugem (que precisa de 18-28°C e >90% UR por 6h). É como comparar dois personagens com builds completamente diferentes!"},
    {q:"O que são resistência simples, cruzada e múltipla a fungicidas, e por que importa para o manejo?",ctx:"Buva (Conyza bonariensis) no PR: resistência confirmada a glifosato (G), ACCase (A), ALS (B), triazinas (C1), dinitranilinas (K1), carbamatos (K2) e inibidores de mitose (K3) — 7 grupos diferentes.",
    opts:["A. São todos a mesma coisa — termos diferentes para o mesmo fenômeno","B. Simples: resistência a um produto. Cruzada: a todos os produtos do mesmo mecanismo de ação. Múltipla: a produtos de DIFERENTES mecanismos. A buva com resistência a 7 grupos é a 'superdaninhas' — só controles culturais ainda funcionam","C. Resistência cruzada só ocorre entre produtos da mesma empresa","D. Fungos não desenvolvem resistência múltipla"],
    correct:1,xp:38,diff:4,why:"💡 A buva com resistência a 7 grupos herbicidas é o boss final que nenhum herbicida sozinho derrota. O único manejo eficaz restante: (1) Plantas de cobertura que sufocam a buva mecanicamente (braquiária densa); (2) Safrinha dessecada tardia que pega antes da formação de sementes; (3) Capina mecânica localizada. É como um inimigo no jogo que desenvolveu escudo para cada tipo de arma — você precisa usar o ambiente!"},
    {q:"BOSS FASE 5: Os 30 produtores concordam em fazer um plano coletivo de transição. Que elementos são obrigatórios no Plano Coletivo ABC+?",ctx:"30 propriedades, média 80ha = 2.400ha total. Práticas elegíveis: SPD, iLPF, recuperação de pastagem, FBN.",
    opts:["A. Basta carta de intenção assinada pelos 30 produtores","B. Obrigatórios: (1) diagnóstico georreferenciado de cada propriedade; (2) linha de base de emissões de GEE (IPCC Tier 2); (3) metas quantificáveis de redução por prática; (4) cronograma com marcos verificáveis; (5) sistema MRV detalhado; (6) ART do responsável técnico (CREA)","C. Plano coletivo não é aceito — cada produtor individualmente","D. Apenas propriedades com CAR e análise de solo recente participam"],
    correct:1,xp:50,diff:5,why:"💡 Para o ABC+ coletivo, o diferencial é a linha de base de emissões: calculada com planilhas Embrapa/MAPA adaptadas do IPCC Tier 2 (disponíveis gratuitamente em embrapa.br/abc). Para 2.400ha em SPD: redução de N₂O + sequestro de C no solo. MRV anual: satélite + análise de solo a cada 2 anos + relatório ao banco. ART do técnico: responsabilidade civil e profissional que garante qualidade técnica e segurança jurídica ao financiamento!"},
  ]},
  {id:6,title:"World 6-1: Solo Vivo",subtitle:"Biologia do Solo",icon:"🔬",world:"MUNDO 6",color:"#0A4A3A",accent:"#34D399",
  story:"BOA! Você chegou na metade — como o Sonic na Reta Final! Escola rural: crianças E pais céticos. Você tem 30 minutos para transformar 'terra é terra' em 'o solo é uma cidade viva'.",
  questions:[
    {q:"Criança pergunta: 'Tio técnico, quantos bichinhos vivem numa colher de chá de terra boa?' Como você responde?",ctx:"1g de solo fértil: 100M-1B bactérias, 10M fungos, 100.000 protozoários. Solo degradado de Seu Raimundo: 100x menos.",
    opts:["A. Nenhum — solo é mineral, não tem organismos vivos","B. Numa colher de chá (5g) de solo saudável: 500 milhões a 5 bilhões de bactérias — mais que todos os humanos da Terra! O solo degradado tem 100x menos — 1% da capacidade biológica","C. Apenas dezenas de minhocas e besouros","D. Cerca de 1.000 organismos"],
    correct:1,xp:25,diff:1,why:"💡 1g de solo saudável pode ter 50.000 espécies de bactérias diferentes (Roesch et al., ISME Journal) — a ciência já identificou menos de 5% delas. Essa comunidade é responsável por: mineralização de 40-200 kgN/ha/ano (grátis), decomposição da MO, supressão de doenças e estruturação do solo. O solo degradado entrega apenas 1% desse serviço!"},
    {q:"Pai cético: 'Se bactérias são tão importantes, por que a soja cresce bem com adubo químico mesmo no solo morto?' Como responder?",ctx:"Nos primeiros 5-7 anos pós-degradação biológica, produtividade se mantém com doses altas. A partir do 8-12° ano: queda progressiva. Custo do fertilizante para manter a produtividade cresce 3-5%/ano.",
    opts:["A. Não há diferença — solo morto com fertilizante performa igual no longo prazo","B. A ilusão dos primeiros anos: fertilizante substitui a nutrição imediata, mas não a estrutura criada pela biota (bioporos, agregação), a supressão biológica de doenças, nem a resiliência à seca. A degradação demora 8-12 anos para aparecer como queda de produtividade","C. O fertilizante químico mata os microrganismos diretamente — degradação imediata","D. Latossolos argilosos são imunes à degradação biológica"],
    correct:1,xp:35,diff:3,why:"💡 A latência da degradação biológica é insidiosa: em 8-12 anos, os sinais aparecem: (1) infiltração caindo de 30 para 5mm/h (sem bioporos de minhocas); (2) doenças de raiz aumentando (sem Trichoderma e Bacillus supressores); (3) dose necessária de fertilizante crescendo 3-5%/ano. Análise Embrapa em 200 propriedades: solos com MO<1% precisam 30-40% mais fertilizante para a mesma produtividade de solos com MO>2,5%!"},
    {q:"O que são as micorrizas arbusculares (FMA) e por que sua destruição pelo arado e fungicidas é tão prejudicial?",ctx:"1cm³ de solo saudável: >1km de hifas de FMA. Zona de captação sem micorriza: 2-4mm de raio. Com micorriza: 20-40cm de raio.",
    opts:["A. Todos os fungos do solo são patogênicos — eliminar com fungicida anualmente","B. FMA são simbiontes que estendem a zona de absorção em 100-1.000x — fundamentais para P, Zn e Cu. Aração destroi hifas mecanicamente. Fungicidas triazóis em alta dose reduzem FMA em 30-70%","C. Fungos benéficos só existem em florestas — em lavouras todos são patogênicos","D. Fungos do solo são todos saprófitas — sem relação direta com raízes"],
    correct:1,xp:38,diff:3,why:"💡 Micorrizas arbusculares: hifas de 2-7 μm de diâmetro exploram 20cm de raio vs. 4mm das raízes. Para fósforo (que move por difusão 0,1-0,3mm/dia), as micorrizas são a solução evolutiva: o fungo está sempre em solo novo ainda rico em P. Sem micorrizas em solos com P<6 mg/dm³: produtividade 30-60% menor com a mesma adubação. A aração destroi a rede em um único passe — leva 2-4 anos para se reconstituir no SPD!"},
    {q:"Mãe preocupada: 'O fungicida que meu marido usa está destruindo o solo?' Como responder honestamente?",ctx:"Meta-análise 126 estudos (Zaller et al., 2021): triazóis reduziram FMA em média 21%; benzimidazóis: até 67%. Efeito cumulativo 5 anos: até 85% de redução.",
    opts:["A. Agrotóxicos aprovados pela ANVISA são 100% seguros para a biota do solo","B. Depende do produto, dose e frequência: triazóis em alta dose e benzimidazóis têm impacto documentado em FMA. A solução não é parar de usar, mas usar a menor dose eficaz e compensar com inoculação de FMA (R$25-40/ha)","C. Qualquer produto aprovado pela ANVISA não tem impacto na biota","D. A biota se recupera em 48h após qualquer aplicação"],
    correct:1,xp:40,diff:4,why:"💡 A resposta honesta: sim, alguns fungicidas têm impacto na biota benéfica — mas é gerenciável. Alto impacto (evitar): benzimidazóis (carbendazim — também restrito pela ANVISA), brometo de metila (proibido!). Médio impacto (usar com critério): triazóis em altas doses repetidas. Estratégia: dose mínima eficaz + inoculação de FMA após safras intensas + MO alta (>2,5%) acelera a recuperação."},
    {q:"Como calcular o valor econômico dos serviços ecossistêmicos do solo vivo em 100ha vs. solo degradado?",ctx:"Solo saudável vs. degradado: mineralização extra = 60 kgN + 12 kgP₂O₅ + 16 kgK₂O/ha/ano. Controle biológico extra: 40% menos fungicida. Infiltração superior: economia em irrigação.",
    opts:["A. Serviços ecossistêmicos não têm valor econômico mensurável","B. Solo saudável fornece: mineralização extra R$274/ha/ano + controle biológico R$240/ha + infiltração melhor R$120/ha + anti-erosão R$150/ha = R$784/ha/ano de serviço gratuito. Em 100ha: R$78.400/ano invisível. ROI de manter o solo saudável: 524%","C. Impossível quantificar — por isso irrelevantes para gestão","D. Apenas a FBN tem valor econômico mensurável"],
    correct:1,xp:42,diff:4,why:"💡 A valoração econômica de serviços ecossistêmicos é um campo científico robusto (TEEB — The Economics of Ecosystems and Biodiversity, ONU). Em 20 anos para 100ha: R$78.400/ano × 20 = R$1,568 MILHÃO em serviços gratuitos. Compare com o custo do SPD: ~R$130/ha/ano × 100ha × 20 anos = R$260.000. Serviço gratuito 6x maior que o custo de manter o solo saudável!"},
    {q:"Explique a FBN (Fixação Biológica de Nitrogênio) de forma técnica e acessível.",ctx:"Soja brasileira: 40M ha dispensam 100% de adubação nitrogenada. Economia: R$40-50 bilhões/ano em ureia não importada.",
    opts:["A. FBN é quando o N do ar vai direto para as folhas pela respiração","B. O ar tem 78% de N₂, mas as plantas não conseguem usar N₂. A bactéria Bradyrhizobium usa a enzima nitrogenase para transformar N₂ em NH₄⁺ (amônia) que a planta absorve. A soja paga a bactéria com açúcar da fotossíntese — parceria que economiza R$40 bilhões/ano","C. Plantas absorvem N do solo como N₂ dissolvido em água","D. FBN só ocorre em pH > 7,5"],
    correct:1,xp:36,diff:2,why:"💡 Para as crianças: a raiz da soja manda 'mensagem química' no solo (flavonoides) — como um DM no Roblox: 'Bradyrhizobium, vem aqui!' A bactéria cria um apartamento (nódulo) na raiz — visível a olho nu como bolinhas rosa. Dentro do nódulo, a nitrogenase quebra o N₂ (tripla ligação — muito forte) em NH₃ que a planta usa. A planta manda açúcar de volta. 40 milhões de ha de soja × 250 kgN/ha = 10 BILHÕES de kg de N grátis por safra!"},
    {q:"Proponha um experimento prático que os próprios produtores possam fazer para ver a biologia do solo funcionando.",ctx:"Disponível: pá, balde, água, régua, canivete, celular. Tempo: 30 minutos. Protocolo validado: TeaBAG Index (Keuskamp et al., 2013).",
    opts:["A. Não é possível avaliar saúde do solo sem análise laboratorial","B. TeaBAG Index: enterrar pares padronizados de chá verde + rooibos a 8cm por 90 dias, pesar antes e depois. Chá verde degradado >60% = biota ativa = solo saudável; <30% = degradado. Na mata nativa: 80-90% degradado vs 20-30% na lavoura convencional","C. O único bioensaio válido é visual — cor do solo","D. Bioensaios de campo são marketing sem valor técnico"],
    correct:1,xp:38,diff:3,why:"💡 O TeaBAG Index foi publicado no periódico Methods in Ecology and Evolution e validado em >1.787 experimentos em 60 países. O chá verde indica atividade microbiana geral; o rooibos indica capacidade de humificação. Na prática de campo: os pais que desenterram os saquinhos e pesam eles mesmos nunca mais questionam a biologia do solo — a ciência torna-se tangível!"},
    {q:"Quais são os 5 bioensaios de campo mais simples e validados que qualquer produtor pode fazer em 30 minutos?",ctx:"Protocolo: Soil Health Card USDA + Cornell CASH + TeaBAG Index OECD.",
    opts:["A. Não é possível avaliar saúde do solo sem análise laboratorial","B. 5 bioensaios em 30 min: (1) Contagem de minhocas (30×30×30cm: >10 = saudável); (2) Teste de infiltração (500mL em PVC: <2min = excelente); (3) Estabilidade de agregados (torrão em água: >30s = estável); (4) Odor de petricor (cheiro de terra molhada = actinobactérias ativas); (5) Penetrometria informal (canivete: entra com polegar = <2MPa, OK)","C. O único bioensaio válido é visual","D. Bioensaios de campo são marketing"],
    correct:1,xp:38,diff:3,why:"💡 Os 5 bioensaios são validados por organismos internacionais: Contagem de minhocas (ISO 23611-1): >10/amostra = saudável. Infiltração (USDA Soil Health): <2min/500mL = excelente. Estabilidade de agregados (Le Bissonnais, 1996): torrão que se mantém >30s tem alta resistência à erosão. Petricor = geosmina de Streptomyces = actinobactérias ativas. Penetrometria com canivete: entra facilmente = <2MPa. Fazem em 30 minutos e revelam mais sobre a saúde real do solo que uma análise química isolada!"},
    {q:"BOSS FASE 6: Elabore os indicadores para um Índice de Saúde do Solo aplicável em campo por qualquer produtor.",ctx:"Framework Cornell CASH + Embrapa + USDA. Sem necessidade de laboratório.",
    opts:["A. Índice de saúde do solo é exclusividade de laboratório certificado","B. Índice em 3 dimensões: FÍSICA (densidade, infiltração, agregação), QUÍMICA (pH, P, K, MO — análise laboratorial anual) e BIOLÓGICA (minhocas, respiração, TeaBAG). Score 0-10 por indicador. Média das 3 dimensões = Índice de Saúde do Solo. Abaixo de 5 = ação urgente necessária","C. Apenas análise química importa para produção comercial","D. Índice de saúde do solo é ferramenta apenas para agricultura orgânica"],
    correct:1,xp:50,diff:5,why:"💡 O Índice de Saúde do Solo integrado (físico + químico + biológico) é mais preditivo da produtividade futura do que qualquer indicador isolado. Solos com score alto em todas as 3 dimensões têm: produtividade 20-35% maior em anos normais, resiliência 60-80% maior em anos de seca e custo de insumos 15-25% menor. É o 'level geral do personagem' — você pode ter muito P mas ser fraco na biologia e perder para um 'boss' climático!"},
  ]},
  {id:7,title:"World 7-1: Tempestade Perfeita",subtitle:"Clima & Adaptação",icon:"⛈️",world:"MUNDO 7",color:"#5C1010",accent:"#FCA5A5",
  story:"MUNDO 7 — o castelo de Bowser! INMET: alerta máximo, 180mm em 24h + 90 dias de seca depois. Dois extremos num mês. Você tem 48h para preparar 15 propriedades!",
  questions:[
    {q:"INMET prevê 180mm em 24h. Quais são as ações técnicas de EMERGÊNCIA para as 48h anteriores?",ctx:"3 propriedades com solo exposto. 5 com terraços sem manutenção há 3 anos. 3 açudes próximos à capacidade máxima.",
    opts:["A. Não há ação possível em 48h — apenas aguardar","B. Em 48h: (1) Solo exposto: espalhar palha disponível como mulching de emergência (reduz erosão 60-80%); (2) Terraços: verificar e limpar sangradouros entupidos urgentemente (terraço sem sangradouro vira represa que rompe); (3) Açudes cheios: abrir comportas para criar buffer de 15-20%","C. Irrigar intensamente antes da chuva para o solo absorver mais","D. Colher tudo antes — produção antes da conservação do solo"],
    correct:1,xp:35,diff:3,why:"💡 O sangradouro é a parte mais crítica do terraço. Se entupido, o terraço retém água além da capacidade e ROMPE — causando erosão em ravina muito maior que se não houvesse o terraço. Verificar e limpar sangradouros antes de evento extremo é obrigação técnica. Açude com 15-20% de folga: reduz o pico de vazão a jusante em 30-50%, protegendo propriedades abaixo."},
    {q:"Como provar que o desmatamento amazônico afeta a chuva do Piauí? Um produtor pergunta sobre os 'rios voadores'.",ctx:"Evapotranspiração amazônica: 20 bilhões t de vapor/dia. Modelo Nobre et al. (2016): desmatamento de 40% = queda de 20-40% na precipitação do Cerrado.",
    opts:["A. Os rios voadores são mito — vapor amazônico se dissipa na própria região","B. A Amazônia 'bombeia' 20 bilhões t/dia de vapor — mais que o Rio Amazonas. O Low-Level Jet transporta esse vapor para o sul, parte chegando ao Nordeste e Centro-Oeste. Com 40% de desmatamento, modelos projetam queda de 20-40% na precipitação do Cerrado","C. O vapor amazônico não alcança o Piauí — longe demais","D. O efeito só impacta regiões adjacentes à Amazônia"],
    correct:1,xp:40,diff:4,why:"💡 Os 'rios voadores' foram descritos por Eneas Salati (1970s) e popularizados por Antonio Nobre (2014). A floresta recicla a água 5-6 vezes antes de ela chegar aos Andes. O Brasil está próximo do 'ponto de não retorno' com 18-20% de desmatamento (estimado em 20-25%). Já sentimos os efeitos: secas mais severas no Cerrado e Nordeste nos últimos 15 anos."},
    {q:"O ZARC indica que a janela de plantio de milho fechou há 15 dias. Um produtor quer plantar mesmo assim. Como orientar?",ctx:"Probabilidade de déficit hídrico na floração se plantar agora: 78%. Custo dos insumos: R$3.200/ha. Proagro exige respeito ao ZARC para cobertura.",
    opts:["A. O ZARC é sugestão não vinculante — produtor tem direito de plantar quando quiser","B. Plantar fora da janela: Proagro não cobrirá a perda + 78% de probabilidade de perda = risco financeiro total de R$3.200/ha descoberto. Recomendação: sorgo forrageiro tem janela aberta, menor custo e tolerância à seca muito superior. O técnico NÃO deve emitir ART para plantio fora da janela","C. Conhecimento tradicional do pai é mais confiável que o ZARC","D. Plantar e torcer — o risco é aceitável dado o custo já pago nas sementes"],
    correct:1,xp:38,diff:3,why:"💡 O ZARC é baseado em 30 anos de dados climáticos e calcula a probabilidade de déficit hídrico crítico durante floração/enchimento de grãos. O PRONAF e o PROAGRO têm como CONDIÇÃO o respeito ao ZARC. Fora da janela: zero seguro + 78% de chance de perda total. O técnico que emite ART para esse plantio tem responsabilidade solidária pelos danos!"},
    {q:"Como calcular o Balanço Hídrico Climatológico e usar esse dado para planejar cultivos na propriedade?",ctx:"Precipitação anual: 1.050mm. Evapotranspiração potencial anual: 1.280mm. CAD do solo: 55mm. Meses críticos: maio-outubro (seca).",
    opts:["A. Balanço hídrico = chuva - temperatura × coeficiente empírico","B. BH pelo método Thornthwaite-Mather: para cada mês, calcular P - ETP. Quando P < ETP: deficit hídrico (demanda de irrigação). Para o Piauí: deficit de ~480mm em 5 meses = cultura de sequeiro com ciclo >90 dias é inviável sem irrigação nesses meses","C. BH é calculado apenas para projetos de grande irrigação","D. Basta medir a pluviometria mensal — ETP não precisa ser calculada"],
    correct:1,xp:40,diff:4,why:"💡 O BHC mensal revela: junho-setembro = 4 meses com deficit total de ~300mm. Culturas viáveis SEM irrigação no período seco: feijão-caupi (ciclo 60-75 dias, tolerância excepcional à seca) e gergelim (ciclo 90 dias, raízes profundas). Para culturas de ciclo médio a longo: irrigação suplementar de 440-480mm = 4.400-4.800m³/ha. App gratuito Agritempo (Embrapa) calcula o BHC para qualquer município!"},
    {q:"O IPCC projeta +2,1°C no Piauí até 2050 e precipitação -15% com eventos extremos. Como isso afeta a soja e quais estratégias de adaptação são viáveis?",ctx:"Temperatura >35°C durante floração da soja: redução de 5-8% por grau acima de 30°C. Dias >35°C: de 120 para 190/ano até 2050.",
    opts:["A. Mais calor é benéfico — plantas crescem mais rápido","B. +2,1°C + -15% chuva = perda potencial de 25-35% na produtividade da soja sem adaptação. Estratégias viáveis: cultivares tolerantes ao calor (linhas EMBRAPA para semiárido), iLPF para microclima (-5°C), plantio antecipado dentro do ZARC, diversificação com feijão-caupi e sorgo resistentes","C. Modelos climáticos são imprecisos — não embasar decisões com eles","D. A adaptação é responsabilidade exclusiva do governo"],
    correct:1,xp:42,diff:4,why:"💡 Para a soja, cada 1°C acima de 30°C durante floração causa aborto de 5-8% das flores (Embrapa, 2020). Com +2,1°C e 190 dias/ano acima de 35°C, praticamente toda a janela de cultivo da soja convencional estará comprometida por estresse calórico. iLPF resolve isso: árvores criam microclima 5-8°C mais fresco — protegem o florescimento e aumentam a eficiência hídrica do pasto em 15-25%!"},
    {q:"Um produtor quer fazer queimada nos restos culturais. Como orientar técnica e legalmente?",ctx:"Art. 38 do Código Florestal: proibição geral do uso do fogo. Art. 38-A: possibilidade de autorização prévia. Período de seca extrema atual.",
    opts:["A. Queimada controlada é proibida em qualquer situação","B. Queima controlada possível SOMENTE com autorização prévia do órgão ambiental, fora do período de seca extrema (IBAMA não autorizará agora). Alternativa técnica superior: triturador de palhada (R$80-150/ha) que mantém cobertura do solo durante a seca","C. Queimada pode ser feita livremente avisando os vizinhos com 24h","D. Em período de seca, queimada é recomendada — elimina pragas"],
    correct:1,xp:38,diff:3,why:"💡 A autorização de queima controlada exige: umidade relativa >60% + vento <15 km/h + brigada constituída. Em seca extrema com UR <30%, essas condições são impossíveis — a autorização não sairá. O incêndio culposo (Art. 250 CP) se configura mesmo com boa intenção se o fogo sair de controle. Triturador de palhada: fragmenta restos em 2-5cm que se decompõem em 60-90 dias E mantêm proteção hídrica do solo durante a seca!"},
    {q:"Elabore um Plano de Adaptação Climática de 5 anos para uma propriedade de 100ha no Piauí com 5 pilares e metas mensuráveis.",ctx:"Situação atual: soja monocultura, COS 0,9%, infiltração 8mm/h, sem terraços, sem mata ciliar, 1 açude.",
    opts:["A. Plano de 5 anos precisa de consultoria internacional","B. 5 pilares: (1) Solo (SPD→COS 1,5% em 3 anos); (2) Água (barraginhas+nascente→3 fontes seguras); (3) Produção (rotação→-50% custos invisíveis); (4) Microclima (iLPF 30ha→-5°C+carbono); (5) Renda (3 fontes em 5 anos→risco -60%). Investimento: R$84.700. Retorno projetado: R$245.000/ano a partir do 5° ano","C. Plano deve focar apenas em seguros agrícolas","D. Para 100ha, adaptação climática nunca tem retorno positivo"],
    correct:1,xp:50,diff:5,why:"💡 ROI do plano: Pilar Solo (subsolagem+SPD): R$22.000 invest. → R$182.000/ano economizados em custos invisíveis. Pilar Água: R$25.500 → garante 3 safras/ano vs. 1-2 atuais. Pilar iLPF (30ha): R$36.000 → R$63.000 em 7 anos + R$6.000/ano em carbono. Pilar Renda diversificada: gado+soja+carbono = 3 fontes independentes. Um choque no preço da soja não quebra mais o produtor!"},
    {q:"O que são as barreiras para adoção de práticas sustentáveis e como o técnico pode ajudar a superá-las?",ctx:"Pesquisa de campo (30 produtores): custo inicial (87%), falta de ATER especializada (73%), dificuldade de acesso a crédito (67%), falta de mercado para culturas da rotação (53%).",
    opts:["A. As barreiras são puramente comportamentais — mais informação técnica resolve tudo","B. Barreiras são múltiplas e sistêmicas: financeiras (PRONAF Eco e ABC+), técnicas (ATER pública e privada), mercado (contratos coletivos, cooperativas) e culturais (demonstração de resultados locais). O técnico precisa atuar como facilitador de rede, não apenas como fonte de informação","C. A única barreira real é o custo — resolver o financiamento resolve todas as outras","D. Produtores que não adotam práticas sustentáveis demonstradas deveriam perder o crédito rural imediatamente"],
    correct:1,xp:40,diff:4,why:"💡 A teoria da adoção de inovações (Everett Rogers, 1962) é tão atual quanto o dia em que foi escrita. No contexto da extensão rural brasileira: (1) ATER: o Brasil tem déficit de 80.000 técnicos rurais (EMATER, 2022). (2) Mercado: contratos futuros com cooperativas + PNAE (30% de compra obrigatória da agricultura familiar). (3) Cultural: fazenda demonstradora local é mais eficaz que qualquer palestra técnica. O técnico moderno é facilitador sistêmico!"},
    {q:"BOSS FASE 7: Como o técnico elabora um Relatório de Vulnerabilidade Climática para uma propriedade rural integrando dados meteorológicos, pedológicos e econômicos?",ctx:"Ferramentas gratuitas: INMET, EMBRAPA AgroMet, MapBiomas, IBGE.",
    opts:["A. Relatório de vulnerabilidade climática é documento acadêmico sem aplicação prática","B. Estrutura: (1) Diagnóstico climático histórico (INMET 30 anos); (2) Capacidade adaptativa do solo (análise + infiltração + COS); (3) Exposição ao risco (posição na bacia, declividade, APP); (4) Sensibilidade produtiva (culturas mais vulneráveis em cada fase); (5) Capacidade adaptativa socioeconômica (acesso a crédito, diversificação, ATER)","C. Vulnerabilidade climática não pode ser avaliada por técnico agrícola — é especialidade de meteorologia","D. Um relatório de 2 páginas com dados pluviométricos é suficiente"],
    correct:1,xp:55,diff:5,why:"💡 O framework IPCC de vulnerabilidade = Exposição × Sensibilidade × (1 / Capacidade Adaptativa). EXPOSIÇÃO: posição na bacia, APP degradada, declividade. SENSIBILIDADE: culturas na propriedade em estágios críticos durante períodos de risco. CAPACIDADE ADAPTATIVA: acesso a crédito emergencial (DAP+PRONAF ativo), diversificação de renda, CAR regularizado (acesso a PSA e crédito verde). A combinação dessas três dimensões gera o índice de vulnerabilidade que guia as ações prioritárias!"},
  ]},
  {id:8,title:"World 8-1: Agrotóxicos",subtitle:"Toxicologia & Risco",icon:"🧪",world:"MUNDO 8",color:"#4A1060",accent:"#C084FC",
  story:"ALERTA VERMELHO! Tomates com resíduo 5× o LMR. 12 produtores em pânico. Câmeras de TV. Você tem uma hora para ser o mais técnico e o mais claro da sua vida!",
  questions:[
    {q:"Resíduo de clorpirifós no tomate: 2,4 mg/kg. LMR: 0,5 mg/kg. Como o LMR foi calculado e o que esse resultado significa?",ctx:"IDA clorpirifós: 0,001 mg/kg pc/dia. Peso corporal médio: 60kg. Consumo médio de tomate: 10,7g/dia.",
    opts:["A. LMR definido pela indústria baseado no sabor e aparência","B. LMR = IDA × peso corporal / consumo alimento = 0,001 × 60 / 0,0107 = 5,6 mg/kg → ANVISA definiu 0,5 (mais conservador). Com 2,4 mg/kg: dose pelo tomate = 43% da IDA — preocupante para crianças e exposição cumulativa","C. LMR baseado apenas no limite de detecção laboratorial","D. Foi escolhido porque abaixo disso é impossível detectar"],
    correct:1,xp:32,diff:3,why:"💡 O LMR protege o 'consumidor médio' considerando todos os alimentos que ele consome. Com 2,4 mg/kg e consumo de 10,7g de tomate, a dose = 43% da IDA SÓ DO TOMATE. Somando outros alimentos com resíduos: a exposição cumulativa pode chegar a 80-120% da IDA diária — acima do seguro para exposição crônica, especialmente para crianças."},
    {q:"O produtor aplicou clorpirifós 4 dias antes da colheita. O período de carência é 14 dias. Por que esse 'erro' de 10 dias causou o resultado de 2,4 mg/kg?",ctx:"Degradação do clorpirifós em tomate: meia-vida 3-5 dias. Resíduo inicial pós-aplicação: ~13 mg/kg.",
    opts:["A. Período de carência é burocracia — 10 dias não muda nada","B. Degradação cinética de 1ª ordem: C(t) = C₀ × e^(-0,693t/t½). C(4 dias) = 13 × 0,5 = 6,5 mg/kg. C(14 dias) = 13 × 0,086 = 1,1 mg/kg — o PC de 14 dias é o MÍNIMO absoluto para essa combinação","C. O PC foi calculado incorretamente pela ANVISA","D. O excesso foi causado por chuva que concentrou o produto"],
    correct:1,xp:35,diff:3,why:"💡 A degradação exponencial não negocia com o calendário do produtor. Para clorpirifós (t½ = 4 dias): dia 0 = 13 mg/kg, dia 4 = 6,5 mg/kg, dia 8 = 3,25 mg/kg, dia 14 = 1,1 mg/kg. O PC de 14 dias é o mínimo para ficar PRÓXIMO do LMR. Colher no dia 4 = produto com 13× o LMR. É física e química aplicadas — respeitar o PC não é burocracia, é ciência!"},
    {q:"Um produtor usa EPI incompleto num fungicida Classe III (azul). 'Classe III significa seguro — não preciso de máscara.' Como você responde?",ctx:"Mancozeb: DL50 > 5.000 mg/kg (Classe III). Porém: IARC Grupo 2B (possível carcinogênico). Interfere nos hormônios tireoidianos com exposição crônica (EPA, 2018).",
    opts:["A. Classe III confirma — produto seguro sem necessidade de EPI completo","B. Classificação toxicológica mede apenas toxicidade AGUDA (DL50). Mancozeb tem efeitos crônicos documentados: perturbador endócrino tireoidiano, possível carcinogênico (IARC 2B). NR-31 exige EPI conforme a bula — não conforme a 'classe colorida'","C. A faixa azul confirma segurança total para qualquer nível de exposição","D. Só precisa de EPI se o produto for Classe I ou II"],
    correct:1,xp:35,diff:3,why:"💡 A classificação toxicológica (DL50) mede TOXICIDADE AGUDA — a dose para matar 50% dos ratos em 14 dias. Ela NÃO avalia: toxicidade crônica, carcinogenicidade (IARC 2B = evidência limitada de câncer em humanos), disrupção endócrina (Mancozeb afeta T4/T3 tireoidianos). A via dérmica é responsável por 80-90% das intoxicações por agrotóxicos — muito mais que a inalatória!"},
    {q:"Como calcular o volume de calda e a dose de um fungicida para 15ha, e por que a calibração do pulverizador é crítica?",ctx:"Produto: Priori Xtra. Dose bula: 300mL/ha. Volume de calda: 150 L/ha. Pulverizador: 800L de tanque.",
    opts:["A. Usar 300mL produto + 150L de água = calda pronta para qualquer área","B. Volume de calda total: 150 L/ha × 15ha = 2.250L = 2,8 tanques de 800L. Produto total: 300mL/ha × 15ha = 4.500mL = 4,5L. Pulverizador descalibrado em ±20% pode aplicar 270 ou 360mL/ha — fitotoxicidade ou controle ineficiente","C. Basta colocar o produto no tanque e completar com água","D. Dobrar a dose compensa erro de calibração"],
    correct:1,xp:32,diff:2,why:"💡 A calibração do pulverizador é a base de qualquer aplicação técnica. Um bico desgastado aplica 15-30% a mais que o novo. Superdosagem: fitotoxicidade + excesso de resíduo + custo extra. Subdosagem: controle ineficiente + risco de resistência (pressão seletiva incompleta favorece os mais resistentes). Calibrar antes de cada aplicação e a cada troca de bico!"},
    {q:"Qual é a 'janela de aplicação' ideal de um defensivo e como determiná-la?",ctx:"Temperatura: 32°C às 14h, 22°C às 6h. Umidade relativa: 28% às 14h, 72% às 6h. Vento: 18 km/h às 14h, 4 km/h às 6h. Chuva prevista: 8h da manhã seguinte.",
    opts:["A. Qualquer horário é equivalente se a dose estiver correta","B. Janela ideal: 5-8h da manhã deste exemplo. Temperatura 22°C (sem volatilização), UR 72% (calda não evapora em trânsito), vento 4 km/h (sem deriva), chuva só às 8h do dia seguinte (24h de janela). Às 14h: calda evapora (UR 28%), deriva severa (vento 18 km/h)","C. Período de maior temperatura é o melhor — estômatos abertos para absorção","D. Apenas a chuva importa — se não chove em 4h, qualquer horário serve"],
    correct:1,xp:35,diff:3,why:"💡 A janela ideal: temperatura 15-28°C + UR > 60% + vento 3-10 km/h + sem chuva em 4-6h. Fora da janela: perda de 20-40% de eficácia. Com UR < 40%, as gotas de calda (150-250 μm de diâmetro) evaporam antes de atingir o alvo — o ingrediente ativo cristaliza no ar. Apps de consulta: Windy, Tempo Agro — todos fornecem previsão de UR e vento por hora!"},
    {q:"Um trabalhador rural apresenta: pupilas contraídas, salivação intensa, lacrimejamento, tremores e bradicardia após manipular metamidofós (organofosforado). Qual o diagnóstico e o protocolo de emergência?",ctx:"EPI incompleto: sem luvas e sem respirador. DL50 oral do metamidofós: 13 mg/kg (Classe I — extremamente tóxico).",
    opts:["A. Reação alérgica leve — dar anti-histamínico e descanso","B. Síndrome colinérgica aguda por intoxicação com organofosforado (inibição da acetilcolinesterase). Protocolo: (1) remover da exposição e tirar roupas contaminadas; (2) lavar com água e sabão; (3) chamar SAMU 192; (4) informar o nome do produto — antídoto: atropina + pralidoxima nas primeiras 24h. EMERGÊNCIA MÉDICA!","C. Hipoglicemia — dar açúcar imediatamente","D. Crise de ansiedade — manter calmo e observar"],
    correct:1,xp:38,diff:3,why:"💡 Organofosforados inibem IRREVERSIVELMENTE a acetilcolinesterase. O excesso de ACh causa síndrome SLUDGE: Salivação, Lacrimejamento, Urinação, Defecação, vômito GI, Edema pulmonar + bradicardia + miose + convulsões. Antídoto: ATROPINA (bloqueia receptores muscarínicos) + PRALIDOXIMA (reativa a colinesterase se administrada em <24h). O metamidofós tem DL50 de apenas 13 mg/kg — comparado ao sal de cozinha com 3.000 mg/kg!"},
    {q:"O que são os efeitos endócrinos subletais dos agrotóxicos e por que são mais difíceis de detectar que a toxicidade aguda?",ctx:"Endocrine Disruption: compostos que interferem no sistema hormonal em doses muito baixas (μg/kg ou ng/kg). Atrazina: alterações hormonais em rãs a 0,1 ppb. Clorpirifós: associado a déficit cognitivo em crianças a doses abaixo do LMR.",
    opts:["A. Efeitos subletais são mito — só a dose letal importa toxicologicamente","B. Disruptores endócrinos atuam em doses 100-10.000x abaixo da DL50: interferem em receptores hormonais (estrogênio, andrógeno, tireoide), causam efeitos crônicos (infertilidade, desenvolvimento neurológico, câncer) que aparecem anos depois da exposição. Difíceis de detectar por: latência longa, exposição a múltiplos compostos simultaneamente (efeito coquetel)","C. Os limites atuais da ANVISA já protegem contra todos os efeitos subletais","D. Efeitos subletais só ocorrem em animais — humanos são resistentes"],
    correct:1,xp:40,diff:4,why:"💡 O 'efeito coquetel': exposição simultânea a múltiplos disruptores endócrinos (um dos alimentos brasileiros mais estudados foi o morango, com detecção de 7-12 compostos em amostras do PARA/ANVISA) pode ter efeito combinado superior ao de cada substância isolada. A NHANES (EUA) detectou >200 compostos químicos no sangue de americanos — a maioria sem avaliação de efeito combinado. É uma das maiores lacunas da toxicologia contemporânea."},
    {q:"Como elaborar o Receituário Agronômico completo para aplicação de um fungicida? Quais são os elementos obrigatórios e a responsabilidade legal do técnico?",ctx:"Lei 7.802/89 e Decreto 4.074/2002. CREA: ART obrigatória.",
    opts:["A. Receituário é apenas formalidade — qualquer texto serve","B. Obrigatórios (Decreto 4.074/2002, Art. 65): identificação do emitente (nome+CREA+ART), cultura e área, praga/doença alvo, produto (nome comercial+IA+dose), número de aplicações, período de carência, EPI necessário, orientações de segurança e descarte de embalagem, data e assinatura. ART sem receituário correto = processo no CREA","C. Basta o nome do produto e a dose","D. O técnico não tem responsabilidade — a culpa é do fabricante"],
