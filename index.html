    correct:1,xp:48,diff:5,why:"💡 O Receituário Agronômico é o documento mais importante da responsabilidade profissional do técnico. A ART (Anotação de Responsabilidade Técnica) vincula o profissional ao ato técnico: se o produto causar dano ambiental, intoxicação ou excesso de resíduo, o técnico emissor é responsabilizado solidariamente (civil) e pode responder criminalmente (Lei 9.605/98) se o dano for ambiental. NUNCA emita sem avaliação técnica presencial da área e da situação fitossanitária!"},
    {q:"BOSS FASE 8: Como você orienta um produtor para montar um sistema completo de rastreabilidade de uso de defensivos, do campo à prateleira?",ctx:"Exigência crescente do mercado: supermercados europeus exigem rastreabilidade completa. PNAE exige caderno de campo. Certificação GlobalGAP exige registro de todas as aplicações.",
    opts:["A. Rastreabilidade é exigência apenas para exportação — mercado interno não precisa","B. Sistema completo: (1) Caderno de campo (data, produto, dose, operador, condições climáticas); (2) Notas fiscais de compra dos defensivos (rastreiam o lote e a validade); (3) Análise de resíduo de amostras representativas antes da colheita; (4) ART do técnico vinculada a cada aplicação; (5) Descarte correto de embalagens (devolução ao revendedor — Lei 7.802/89). Sistema digital: apps como AgriApp, AgroTag, Traive automatizam tudo","C. Apenas empresas certificadas GlobalGAP precisam de rastreabilidade","D. Caderno de campo é suficiente — não precisa de nota fiscal nem ART"],
    correct:1,xp:50,diff:5,why:"💡 A rastreabilidade completa protege o produtor, o consumidor e o técnico. Caderno de campo: obrigatório no PNAE (Lei 11.947/2009) e recomendado pela Portaria MAPA 2.699/2022. Análise de resíduo pré-colheita: custo de R$80-150/amostra pode prevenir interdição de R$50.000+ de produto. Devolução de embalagens: obrigatória pela Lei 7.802/89 — multa de R$5.000-R$1 milhão por embalagem descartada incorretamente. O técnico que orienta corretamente protege o produtor de riscos legais e abre mercados premium!"},
  ]},
  {id:9,title:"World 9-1: O Futuro que Plantamos",subtitle:"Agroecologia & Tecnologia",icon:"🚀",world:"MUNDO 9",color:"#1A2060",accent:"#818CF8",
  story:"PENÚLTIMA FASE! A prefeitura lançou 'Propriedade do Futuro'. Você elabora projetos técnicos para 20 produtores inovadores. Inovação e ecologia não são opostos — são o mesmo time!",
  questions:[
    {q:"O que é a Agricultura Regenerativa e como ela vai além da sustentabilidade?",ctx:"Gabe Brown, David Montgomery: 5 princípios documentados em meta-análise do Rodale Institute (2011, 2020).",
    opts:["A. Produção exclusivamente para autoconsumo sem fins comerciais","B. Vai além da sustentabilidade: cobertura permanente, mínimo revolvimento, diversidade de plantas, integração de animais e redução progressiva de insumos externos. Objetivo: REGENERAR o carbono e a biologia. Estudos: sequestro de 1-3 t C/ha/ano + produtividade equivalente ao convencional em 5-10 anos + custos -20-30%","C. Versão moderna da agricultura convencional com mais tecnologia","D. Plantar em círculos para otimizar o uso da área"],
    correct:1,xp:30,diff:3,why:"💡 Sustentabilidade = manter o que tem. Regenerativa = melhorar o que tem. Os 5 princípios são implementáveis incrementalmente: (1) Solo sempre coberto; (2) Mínimo revolvimento; (3) Diversidade de espécies (mínimo 4 na rotação); (4) Presença animal (gado estimula microbiota); (5) Reduzir insumos externos gradualmente à medida que a biologia do solo se recupera. Custo reduz enquanto produtividade se mantém ou cresce!"},
    {q:"Como drones com câmeras multiespectrais transformam o diagnóstico agronômico?",ctx:"Drone com câmera multiespectral: resolução 3-10cm/pixel, 200ha/missão em 45 minutos. Índices: NDVI, NDRE, NDWI.",
    opts:["A. Drones são apenas para fotografar a fazenda — sem aplicação técnica","B. NDVI (saúde geral), NDRE (teor de N foliar), NDWI (estresse hídrico) permitem: detecção de ferrugem 7-10 dias antes dos sintomas visuais, mapa de variabilidade de biomassa para aplicação localizada de N, identificação precoce de nematoide. 200ha em 45 min a 3-10cm/pixel","C. Drones só funcionam em propriedades acima de 1.000ha","D. O uso de drones dispensa o técnico no campo"],
    correct:1,xp:35,diff:3,why:"💡 NDVI (Normalized Difference Vegetation Index) = (NIR - Red) / (NIR + Red): valores 0-1, onde >0,6 = vegetação saudável. NDRE é mais sensível ao status de N foliar. NDWI detecta estresse hídrico antes que a planta murche visivelmente. Detecção pré-sintomática de ferrugem: fungos alteram a reflectância foliar no infravermelho próximo 7-10 dias antes dos uredossoros aparecerem — IA já identifica isso com 85% de acurácia!"},
    {q:"Quais são os produtos biológicos mais usados e validados para a soja brasileira?",ctx:"Mercado brasileiro de biológicos: crescimento de 400% em 10 anos (2012-2022), chegando a USD 800 milhões.",
    opts:["A. Inoculação de DNA estranho nas plantas (transgenia agronômica)","B. Bradyrhizobium (FBN soja: 200-300 kgN/ha), Azospirillum (FBN gramíneas: 20-40 kgN/ha + fitorreguladores), Trichoderma (controle Fusarium/Rhizoctonia), Bacillus subtilis (resistência sistêmica), FMA (P, Zn, Cu). ROI médio: R$200-400/ha benefício para R$30-80/ha investido","C. Adição de antibióticos ao solo para eliminar patógenos","D. Uso de vírus para controle biológico de pragas"],
    correct:1,xp:35,diff:3,why:"💡 Os bioinoculantes lideram o crescimento do mercado de insumos agrícolas no Brasil. Bradyrhizobium + Azospirillum co-inoculados em soja: aumento de 3-8% na produtividade vs. inoculação simples (meta-análise de 26 ensaios, Hungria et al., 2015). Trichoderma harzianum em algodão: redução de 65% em Fusarium oxysporum a R$35/ha vs. nematicida de R$280/ha. O técnico moderno integra biológicos + químicos seletivos + culturais no MIP!"},
    {q:"Como o Blockchain pode gerar valor para o produtor piauiense na rastreabilidade agrícola?",ctx:"Exemplos: café brasileiro premium, dendê sustentável Indonésia. Premium documentado: 15-40% acima do mercado spot.",
    opts:["A. Blockchain é tecnologia financeira sem aplicação no agronegócio","B. Registro imutável e auditável de cada etapa: insumos + análises de solo + práticas + colheita + transporte. Consumidor acessa via QR code. Premium de 15-40% sobre o preço spot para produto rastreado. Para o PNAE ou exportação: rastreabilidade é diferencial competitivo real e crescente","C. Tecnologia cara disponível apenas para grandes exportadores","D. Blockchain substitui as certificações orgânicas tradicionais"],
    correct:1,xp:40,diff:4,why:"💡 Cada 'bloco' de dados (compra de semente, análise de solo, aplicação de produto, colheita) é registrado com timestamp e hash criptográfico — impossível de alterar retroativamente. Para o produtor piauiense de soja não-OGM ou café especial: o premium de 15-40% sobre o preço spot pode representar R$21 a R$56/sc a mais de soja (sobre preço base de R$140). Para 80ha com 60sc/ha: R$100.800-268.800 extras por safra!"},
    {q:"O que é a fitorremediação e como pode ser usada para descontaminar solos com resíduos de agrotóxicos?",ctx:"Espécies fitorremediadoras: girassol (clorotalonil, DDT), crotalária (nematocidas), nabo forrageiro (linuron), vetiver (organoclorados). Tempo médio: 2-5 anos.",
    opts:["A. Fitorremediação é mito — plantas não absorvem compostos orgânicos do solo","B. Plantas hiperacumuladoras absorvem e biotransformam contaminantes via fitoextração (acúmulo nos tecidos), rizodegradação (microrganismos da rizosfera degradam acelerados por exsudatos) e fitoestabilização (imobilizam o contaminante). Eficiência: 40-70% de redução em organoclorados em 3 anos","C. Apenas bactérias fazem biorremediação — plantas são passivas","D. Fitorremediação só funciona para metais pesados"],
    correct:1,xp:38,diff:3,why:"💡 Mecanismos de fitorremediação: (1) FITOEXTRAÇÃO: raízes absorvem o contaminante — após colheita, biomassa contaminada é incinerada em aterro especial. (2) RIZODEGRADAÇÃO: exsudatos radiculares (açúcares, aminoácidos, enzimas) estimulam populações microbianas específicas que degradam pesticidas 10-100x mais rápido que no solo sem raízes. Para DDT (meia-vida 2-15 anos), consórcio girassol + crotalária reduziu a concentração em 65% em 4 anos!"},
    {q:"Como usar o Google Earth Engine (GEE) gratuitamente para monitoramento de APP e análise de vegetação?",ctx:"GEE: plataforma de análise geoespacial em nuvem, acesso gratuito para pesquisa e educação. Imagens: Landsat (30m, 16 dias), Sentinel-2 (10m, 5 dias).",
    opts:["A. GEE é acessível apenas para universidades com licença paga","B. GEE gratuito: série histórica de NDVI (Landsat desde 1984 + Sentinel-2 desde 2015), detecção de queimadas, monitoramento temporal de cobertura vegetal para verificar conformidade de APP e RL do CAR. Script em JavaScript simples gera mapa de mudança de vegetação para qualquer propriedade","C. Imagens gratuitas têm resolução de 1km — insuficiente para uso técnico","D. O uso do GEE requer licença de geoespacialista"],
    correct:1,xp:38,diff:4,why:"💡 O GEE é uma das ferramentas mais poderosas disponíveis gratuitamente para técnicos agrícolas. Exemplo de uso: monitorar a evolução da cobertura de APP ao longo dos anos com imagens Sentinel-2 de 10m de resolução. O INPE disponibiliza também o TerraMonitor, PRODES (desmatamento) e DETER (alertas em tempo quase real) sem custo. Para o CAR: verificar se as áreas declaradas como APP e RL estão realmente com vegetação nativa usando série temporal de NDVI é possível em 30 minutos!"},
    {q:"Como elaborar um Projeto de Produção Orgânica Certificada?",ctx:"IN 46/2012 MAPA: norma brasileira para produção orgânica. Prazo de conversão: 12 meses (anuais) a 18 meses (perenes). Premium médio: 20-40% sobre convencional.",
    opts:["A. Basta parar de usar agrotóxicos e declarar-se orgânico — certificação é opcional","B. Elementos: (1) período de conversão (12-18 meses sem insumos proibidos); (2) plano de manejo com insumos permitidos (IN 46 MAPA); (3) rastreabilidade de insumos e produção; (4) vínculo com certificadora credenciada pelo MAPA; (5) cadastro no SISAN. Premium de 20-40% justifica o custo de certificação (R$3.000-8.000/ano)","C. Certificação orgânica proíbe qualquer produto — incluindo calcário e esterco","D. Qualquer produto com rótulo 'natural' pode ser usado em produção orgânica"],
    correct:1,xp:40,diff:4,why:"💡 Certificação orgânica no Brasil: Lei 10.831/2003 e IN 46/2012. O período de conversão é o 'detox' da área. Insumos proibidos: fertilizantes nitrogenados sintéticos, agrotóxicos convencionais, OGMs, hormônios. Permitidos: compostos orgânicos, biofertilizantes, calcário e gesso (origens naturais aprovadas), extratos botânicos, biopesticidas registrados. PNAE: compra obrigatória de 30% da agricultura familiar (Lei 11.947/2009) — mercado garantido para hortifrúti orgânico a 30-40% acima do convencional!"},
    {q:"Como funciona a economia circular aplicada à propriedade rural?",ctx:"Modelo linear: extrair-produzir-descartar. Circular: eliminar resíduos, circular materiais, regenerar a natureza. Exemplos: palha → cobertura → MO; esterco → biogás + biofertilizante.",
    opts:["A. Economia circular é o mesmo que agricultura orgânica","B. Propriedade circular transforma: palha de soja → cobertura → MO do solo → nutrientes para próxima safra; esterco bovino → biodigestor → biogás (substitui GLP) + biofertilizante (N 3x mais disponível); cascas de frutas → compostagem → adubo orgânico. Redução de 30-60% em insumos externos + múltiplas fontes de receita","C. Plantar em círculos para otimizar o uso da área","D. Economia circular só é viável em propriedades acima de 500ha"],
    correct:1,xp:38,diff:3,why:"💡 Exemplo concreto: esterco de 50 bovinos (15 t/mês) → biodigestor → 300m³ biogás/mês (substitui 180 kg GLP = R$1.080/mês) + 450m³ biofertilizante/mês (valor agronômico de N: R$2.700/mês). Economia anual total: ~R$45.000 de insumos que deixam de ser comprados. Palha de soja (6 t/ha × 100ha = 600t) → cobertura → economiza R$30.000-36.000/ano em fertilizante e calcário (menos calagem necessária com MO alta)!"},
    {q:"BOSS FASE 9: Como o técnico elabora um Plano de Negócios Agroecológico para migrar de sistema convencional para orgânico-regenerativo em 5 anos?",ctx:"Situação inicial: 50ha soja convencional, R$2.800/ha de lucro. Meta: sistema diversificado orgânico com 4 culturas + pecuária leve.",
    opts:["A. Plano de negócios é documento de banco — sem função técnica agronômica","B. Estrutura: (1) diagnóstico completo; (2) análise de mercado local para produtos orgânicos; (3) cronograma de transição por área (converter 10-15ha/ano, não tudo de uma vez); (4) projeção financeira por cenários (otimista, base, pessimista); (5) plano de acesso a crédito (PRONAF Agroecologia a 0,5% a.a.); (6) estratégia de mercado (PNAE, feiras, CSA, exportação)","C. Migrar para orgânico exige abandonar toda a renda no primeiro ano","D. Apenas propriedades acima de 200ha têm escala para viabilidade orgânica"],
    correct:1,xp:50,diff:5,why:"💡 A transição gradual é a chave: converter 10-15ha/ano enquanto mantém renda da área convencional. Projeção para 50ha: anos 1-2 (conversão, vendas no convencional): lucro similar. Anos 3-5 (primeiros produtos certificados): premium de 25-35% eleva receita. Ano 5+ (sistema pleno): diversificação com 4 culturas + pecuária leve = 3 picos de renda por ano vs. 1 pico da soja. PRONAF Agroecologia: até R$45.000/ano a 0,5% a.a. PNAE: mercado garantido a preços 30-40% acima do convencional!"},
  ]},
  {id:10,title:"World 10 BOSS: O Grande Desafio",subtitle:"Gestão Integrada",icon:"🏆",world:"MUNDO 10",color:"#0A3A0A",accent:"#4ADE80",
  story:"FASE FINAL! O BOSS de todos os bosses! Você foi chamado para elaborar o Plano de Manejo Integrado da Fazenda Esperança — 500ha, bacia hidrográfica degradada, solo exausto. Este é o maior desafio da sua carreira. TUDO que você aprendeu será usado agora!",
  questions:[
    {q:"Qual é a primeira etapa técnica obrigatória antes de qualquer intervenção num Plano de Manejo Integrado de 500ha?",ctx:"Propriedade com 20 anos de soja convencional, solo degradado, bacia hidrográfica comprometida, endividamento de R$800.000.",
    opts:["A. Aplicar calcário imediatamente em toda a área","B. Diagnóstico integrado: análise de solo em grade (1 amostra/ha), levantamento topográfico, análise de qualidade da água, mapeamento de APP/RL via CAR/SIGEF, entrevistas com o produtor sobre histórico. Custo: R$80-120/ha. Retorno garantido em 1-2 safras","C. Definir o que plantar baseado no preço de mercado atual","D. Contratar mais tratores para preparar o solo imediatamente"],
    correct:1,xp:40,diff:4,why:"💡 Diagnosticar antes de prescrever: o médico que receitua remédio sem exame não é bom médico. O diagnóstico integrado para 500ha inclui: grade amostral de solo (500 pontos = R$40.000) → mapa de variabilidade de pH, P, K, MO, Al, Ca, Mg por talhão + levantamento topográfico (SRTM ou drone) para projeto de terraços + análise de água de poços e açudes + CAR com shapefile de APP/RL. Sem diagnóstico: R$500.000+ em corretivos aplicados sem critério!"},
    {q:"Como calcular a Reserva Legal exigida para os 500ha no Cerrado piauiense e quais os instrumentos de regularização disponíveis?",ctx:"Código Florestal Lei 12.651/2012. Piauí: Cerrado fora da Amazônia Legal. Área nativa atual: 65ha. CAR não registrado.",
    opts:["A. 20% da área total = 100ha de RL","B. Cerrado FORA da Amazônia Legal: RL = 20% = 100ha. Com 65ha de nativa atual: 35ha de deficit. Opções: (1) recuperar 35ha na propriedade; (2) compensar por CRA (Cédula de Reposição Ambiental) no mesmo bioma; (3) PRA com prazo de recuperação gradual","C. Cerrado Piauí tem RL de 35% (igual ao Cerrado da Amazônia Legal)","D. Propriedades abaixo de 1.000ha são isentas de RL"],
    correct:1,xp:40,diff:4,why:"💡 A RL é obrigatória para TODAS as propriedades rurais no Brasil. A porcentagem varia por bioma e localização: AMAZÔNIA LEGAL: Floresta = 80%, Cerrado = 35%. FORA da Amazônia Legal (todos os outros estados): 20%. Para o Piauí: 20%. CRA (Cédula de Reposição Ambiental): título que representa área de vegetação nativa como ativo ambiental. O proprietário com déficit pode comprar CRA de quem tem excedente NO MESMO BIOMA — solução ágil para regularização!"},
    {q:"O plano prevê recuperação de 50ha de pastagem degradada (grau III-IV). Qual é o protocolo técnico completo?",ctx:"Objetivo: integrar no iLPF em 3 anos. Disponibilidade: 2 tratores e R$150.000 de crédito ABC+.",
    opts:["A. Apenas roçar a pastagem e aguardar regeneração natural","B. Protocolo: (1) análise de solo → calagem (2-4 t/ha) + gessagem (500-1.000 kg/ha); (2) escarificação superficial; (3) ressemeadura com braquiária BRS Piatã; (4) adubação NPK de estabelecimento; (5) vedação 90 dias. Custo: R$1.500-2.500/ha. Retorno em 2-3 anos por renda pecuária + melhora do solo para iLPF","C. Desmatamento e replantio com soja imediatamente","D. Aplicar herbicida total e aguardar regeneração espontânea"],
    correct:1,xp:42,diff:4,why:"💡 O Brasil tem 150-180 milhões de ha de pastagem, com 50-60% em algum grau de degradação — passivo produtivo e ambiental de R$350 bilhões. Cada hectare de pastagem recuperada sequestra 0,5-2,0 t C/ha/ano e aumenta a lotação de 0,5 para 2,5-3,0 UA/ha (5-6x mais produtividade). O custo de recuperação (R$1.500-2.500/ha) é recuperado em 2-3 anos pelo aumento da renda pecuária. Linha ABC+ específica para pastagens: 3,0% a.a. em 12 anos!"},
    {q:"Para o projeto de terraçamento de 500ha com declividade média de 10%, calcule o espaçamento vertical (EV) e horizontal (EH) pelo método de Bertoni.",ctx:"Solo: Latossolo argiloso. Fator de erodibilidade (F para argiloso): 0,5. Declividade: 10%.",
    opts:["A. Um terraço a cada 100m independente da declividade","B. EV = 2 + F × D = 2 + 0,5 × 10 = 7m. EH = EV/D × 100 = 7/10 × 100 = 70m. Em gleba de 300m de rampa: 300/70 = ~4-5 terraços. Cada terraço precisa de sangradouro e gradiente de 0,2-0,5% para escoamento controlado","C. Terraços são dispensáveis em declividades abaixo de 15%","D. EV = declividade diretamente sem cálculo adicional"],
    correct:1,xp:45,diff:5,why:"💡 O método de Bertoni (Embrapa IAC) é o mais usado no Brasil: EV(m) = 2 + F × D. Para solo argiloso (F=0,5) e D=10%: EV = 7m, EH = 70m. Para solo arenoso (F=1/3): EV = 5,33m, EH = 53m — espaçamento menor porque solo arenoso é mais erodível. IMPORTANTE: terraço com sangradouro em gradiente (0,2-0,5%) conduz a água para saída controlada. Terraço em nível retém toda a água — maior recarga do lençol, mas maior risco de rompimento em eventos extremos!"},
    {q:"Como integrar PSA hídrico, mercado de carbono e PRONAF Eco num único plano financeiro para a Fazenda Esperança?",ctx:"PSA hídrico: R$150/ha/ano de APP × 80ha = R$12.000/ano. Carbono SPD: 0,8 t C/ha/ano × 500ha × R$60/t CO₂ × 3,67 = ~R$88.000/ano bruto. PRONAF Eco: até R$165.000 a 3,5% a.a.",
    opts:["A. Esses três mecanismos são incompatíveis e não podem ser combinados","B. Plano integrado: PRONAF Eco financia a implantação (SPD+terraços+iLPF: R$165.000 a 3,5%). PSA hídrico: R$12.000/ano. Carbono: R$88.000 - R$15.000 (MRV) = R$73.000/ano líquido. Total de novas receitas: R$85.000/ano para servir a dívida e gerar lucro. A implantação se autofinancia em 1,9 anos","C. PSA e carbono são concorrentes — registrar um impede o outro","D. Mercado de carbono só está disponível após 10 anos de SPD"],
    correct:1,xp:50,diff:5,why:"💡 A trilogia do financiamento verde: PSA remunera conservação de APP e nascentes (serviço hídrico). Carbono remunera sequestro de C no solo (serviço climático). PRONAF Eco financia as práticas. São complementares: APP gera PSA (não carbono, pois é obrigação legal). Área produtiva com SPD gera carbono. RL e vegetação nativa podem gerar REDD+. Total de novas receitas: R$85.000/ano → payback em menos de 2 anos!"},
    {q:"Como elaborar o Balanço Hídrico da propriedade e usar esse dado para planejar o sistema de barraginhas?",ctx:"Precipitação média: 1.050mm. ETP anual: 1.280mm. CAD do solo: 55mm. Área irrigada atual: 30ha.",
    opts:["A. Balanço hídrico = chuva - temperatura × coeficiente empírico","B. BH pelo método Thornthwaite-Mather: calcular mês a mês P - ETP. Deficit anual de ~480mm × 500ha = 2.400.000m³/ano de deficit. 100 barraginhas estratégicas (500m³ cada = 50.000m³ retidos por evento) suprem 2-4% do deficit anual mas recarregam o lençol e mantêm pastagens por 2-3 semanas a mais na seca","C. BH é calculado apenas para projetos acima de 1.000ha","D. Basta medir a pluviometria mensal — ETP não precisa ser calculada"],
    correct:1,xp:48,diff:5,why:"💡 O método Thornthwaite-Mather (1955) calcula o BH mês a mês: se P > ETP → excedente (recarga do aquífero + escoamento). Se P < ETP → deficit (demanda de irrigação ou estresse da cultura). Para o Piauí: junho-setembro = 4 meses com deficit total de ~300mm. 100 barraginhas estrategicamente distribuídas em 500ha retêm 50.000m³ por evento chuvoso — recarregam o lençol e mantêm pastagens com produtividade por 2-3 semanas a mais na seca!"},
    {q:"Qual é o Laudo de Capacidade de Uso do Solo e como ele guia o planejamento do uso da terra nos 500ha?",ctx:"Sistema Klingebiel & Montgomery (1961), adaptado pela EMBRAPA. 8 classes. Mapeamento com levantamento de campo.",
    opts:["A. Laudo de capacidade de uso é documento burocrático sem impacto produtivo","B. Classes I-IV: aptidão para lavoura (limitações crescentes). Classes V-VI: pastagem e silvicultura. Classes VII: floresta extensiva. Classe VIII: preservação permanente. Mapeando os 500ha: identifica quais áreas são Classe VIII (APP/RL obrigatória) e quais são I-III (melhores para lavoura) — evita lavoura em área de Classe VII (erosão severa garantida)","C. Laudo é exclusivamente para fins de regularização ambiental","D. Com tecnologia suficiente, qualquer solo pode ser cultivado"],
    correct:1,xp:48,diff:5,why:"💡 O Sistema de Capacidade de Uso é o 'mapa de bioma' da propriedade: Classe I: plana, solo profundo e fértil, sem limitações — lavoura intensiva. Classe III: declive moderado (8-13%) — lavoura com terraços. Classe V: várzeas — pastagem permanente ou rizicultura. Classe VIII: declividade >45° ou beira de nascente — preservação obrigatória. Forçar o uso contrário tem custo altíssimo: lavoura em Classe VII = erosão catastrófica garantida!"},
    {q:"Qual é o impacto estimado se 100% das propriedades rurais do município adotassem as práticas do Plano de Manejo Integrado?",ctx:"Município: 120.000ha de lavoura + 40.000ha de pastagem + 20.000ha de vegetação nativa. 800 produtores rurais.",
    opts:["A. O impacto seria mínimo — escala de fazenda não afeta indicadores regionais","B. Em 10 anos: erosão -60% (terraços + SPD): -480.000 t sedimentos/ano no ribeirão. Recuperação de 15.000ha de APP: +20 nascentes + aumento de 35% na vazão mínima de 3 rios. Carbono: 120.000ha × 0,8 t C/ha/ano = 352.320 t CO₂ = R$21M/ano em crédito de carbono potencial para o município","C. Mudanças regionais só ocorrem com legislação mais rígida","D. O problema é global demais para ser resolvido em escala local"],
    correct:1,xp:55,diff:5,why:"💡 Casos reais documentados: (1) Noroeste do Paraná: de 'deserto vermelho' na década de 1970 para maior produtor de trigo/soja do Brasil após adoção massiva do SPD nos anos 1990. (2) Bacia do Rio São Marcos (GO/MG): 15 anos de SPD + terraços = redução de 65% na turbidez (Embrapa Cerrados, 2018). (3) Programa Produtor de Água (ANA): em média 40-70% de redução de sedimentos e 20-45% de aumento da vazão mínima. A transformação regional começa com cada técnico e cada decisão!"},
    {q:"QUESTÃO FINAL — NÍVEL MÍTICO: Como o técnico agrícola do século 21 deve integrar todas as dimensões — técnica, ambiental, social, econômica e climática — numa só prática profissional?",ctx:"1 técnico impacta em média 80-150 produtores ao longo da carreira. 70% dos municípios brasileiros dependem economicamente da agropecuária.",
    opts:["A. O técnico deve focar apenas no aspecto produtivo — questões sociais e ambientais são de outros profissionais","B. O técnico do século 21 é facilitador sistêmico: domina a ciência do solo, água, nutrição e pragas + conhece instrumentos legais e de crédito + escuta produtores e a comunidade + monitora o clima e adapta recomendações + documenta com ART e ética profissional. 1 técnico × 100 produtores × 80ha = 8.000ha de agricultura mais sustentável","C. A especialização em uma única área é mais eficiente — generalista não domina nada","D. A responsabilidade técnica deve ser minimizada para evitar riscos legais"],
    correct:1,xp:100,diff:5,why:"💡 CERTIFICADO DE EXCELÊNCIA DESBLOQUEADO! Você chegou ao fim. 1 hectare de solo recuperado = 167.000 litros a mais de água retida = menos erosão = rio mais limpo = família rural com renda mais estável = carbono sequestrado = clima mais estável. Tudo está conectado — solo, água, clima, economia, vida. Cada decisão técnica correta que você tomar ao longo de 30 anos de carreira impacta centenas de famílias, milhares de hectares e toneladas de carbono. A ciência que você aprendeu aqui não é teoria — é o fundamento de um Brasil rural mais produtivo, mais justo e mais resiliente. Boa sorte, Técnico! 🌾"},
  ]},

@keyframes walk{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes floatpet{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-8px) rotate(5deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
`;

function Bar({v,max,color,h=10}){
  return(
    <div style={{height:h,background:"#1a1a2e",border:`1px solid ${BORDER}`,overflow:"hidden"}}>
      <div style={{width:`${Math.max(0,Math.min(100,(v/max)*100))}%`,height:"100%",background:color,transition:"width 0.5s"}}/>
    </div>
  );
}

function App(){
  const[screen,setScreen]=useState("intro");
  const[name,setName]=useState("");
  const[petIdx,setPetIdx]=useState(0);
  const[phase,setPhase]=useState(0);
  const[qIdx,setQIdx]=useState(0);
  const[hp,setHp]=useState(100);
  const[xp,setXp]=useState(0);
  const[level,setLevel]=useState(1);
  const[score,setScore]=useState(0);
  const[streak,setStreak]=useState(0);
  const[answered,setAnswered]=useState(null);
  const[correct,setCorrect]=useState(null);
  const[showWhy,setShowWhy]=useState(false);
  const[log,setLog]=useState([]);
  const[totalRight,setTotalRight]=useState(0);
  const[walkPos,setWalkPos]=useState(0);

  const pet=PETS[petIdx];
  const ph=PHASES[phase];
  const q=ph&&ph.questions[qIdx];
  const totalQ=ph?ph.questions.length:1;
  const xpNext=level*150;

  useEffect(()=>{
    if(screen==="game")setWalkPos(Math.round((qIdx/totalQ)*88));
  },[qIdx,screen,totalQ]);

  const addLog=m=>setLog(l=>[m,...l].slice(0,5));

  const handleAnswer=idx=>{
    if(answered!==null)return;
    setAnswered(idx);
    const ok=idx===q.correct;
    setCorrect(ok);
    setShowWhy(false);
    if(ok){
      const mult=streak>=3?2:streak>=2?1.5:1;
      const gained=Math.round(q.xp*mult);
      const newXp=xp+gained;
      const newLevel=Math.floor(newXp/xpNext)+1;
      setXp(newXp%(newLevel*150));
      setLevel(Math.max(level,newLevel));
      setScore(s=>s+gained);
      setStreak(s=>s+1);
      setTotalRight(t=>t+1);
      if(pet.stat==="hp")setHp(h=>Math.min(100,h+8));
      addLog(`✅ +${gained}XP${mult>1?` 🔥x${mult}`:""}`);
    }else{
      const dmg=pet.stat==="def"?10:22;
      const newHp=Math.max(0,hp-dmg);
      setHp(newHp);
      setStreak(0);
      addLog(`❌ -${dmg} HP | Combo zerado`);
      if(newHp<=0){setTimeout(()=>setScreen("over"),1400);return;}
    }
  };

  const nextQ=()=>{
    if(qIdx+1>=totalQ){setScreen("phaseclear");return;}
    setQIdx(i=>i+1);
    setAnswered(null);setCorrect(null);setShowWhy(false);
  };

  const nextPhase=()=>{
    if(phase+1>=PHASES.length){setScreen("victory");return;}
    setPhase(p=>p+1);setQIdx(0);
    setAnswered(null);setCorrect(null);setShowWhy(false);setScreen("game");
    addLog(`🌾 Fase ${phase+2} iniciada!`);
  };

  const restart=()=>{
    setScreen("intro");setPhase(0);setQIdx(0);setHp(100);
    setXp(0);setLevel(1);setScore(0);setStreak(0);
    setAnswered(null);setCorrect(null);setShowWhy(false);
    setLog([]);setTotalRight(0);
  };

  if(screen==="intro")return(
    <div style={{...PF,background:BG,minHeight:"100vh",color:"#ddd",padding:16}}>
      <style>{STYLE}</style>
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <div style={{background:CARD,border:`2px solid ${GOLD}`,borderRadius:4,padding:20,marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:36,animation:"pop 2s infinite",display:"inline-block"}}>🌾</div>
          <div style={{fontSize:18,color:GOLD,letterSpacing:3,marginBottom:2}}>AGROTECH RPG</div>
          <div style={{fontSize:9,color:TEAL,letterSpacing:2}}>◀ TÉCNICO AGRÍCOLA — PIXEL EDITION ▶</div>
          <div style={{fontSize:9,color:GRAY,marginTop:4}}>10 MUNDOS • 100 QUESTÕES • ESTILO 80s</div>
          <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:8,fontSize:12}}>
            {["🍄","⭐","🌀","💎","🔥"].map((e,i)=><span key={i} style={{animation:`blink ${1+i*0.3}s infinite`}}>{e}</span>)}
          </div>
        </div>
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:4,padding:14,marginBottom:12}}>
          <div style={{fontSize:10,color:TEAL,marginBottom:8}}>▶ INSIRA SEU NOME, TÉCNICO:</div>
          <input value={name} onChange={e=>setName(e.target.value)} maxLength={18} placeholder="Player 1..."
            style={{background:"#0d0d1a",border:`1px solid ${BLUE}`,color:GOLD,padding:"8px 10px",fontSize:13,width:"100%",boxSizing:"border-box",borderRadius:2,fontFamily:"'Courier New',monospace",outline:"none"}}/>
        </div>
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:4,padding:14,marginBottom:12}}>
          <div style={{fontSize:10,color:TEAL,marginBottom:10}}>▶ ESCOLHA SEU PET COMPANION:</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {PETS.map((p,i)=>(
              <button key={i} onClick={()=>setPetIdx(i)}
                style={{...PF,background:petIdx===i?"#0d1a2e":"#111",border:`1px solid ${petIdx===i?p.color:BORDER}`,
                  color:petIdx===i?p.color:GRAY,padding:"10px 8px",cursor:"pointer",textAlign:"left",borderRadius:2,fontSize:10}}>
                <div style={{fontSize:22,display:"block",animation:petIdx===i?"floatpet 1.5s infinite":"none"}}>{p.emoji}</div>
                <div style={{color:petIdx===i?GOLD:"#aaa",fontWeight:"bold",marginTop:4}}>{p.label}</div>
                <div style={{color:TEAL,fontSize:9,marginTop:2}}>{p.bonus}</div>
              </button>
            ))}
          </div>
        </div>
        <div style={{background:"#0a0a1a",border:`1px solid ${BORDER}`,borderRadius:4,padding:12,marginBottom:14,fontSize:9,color:GRAY,lineHeight:1.9}}>
          <span style={{color:GOLD}}>HOW TO PLAY:</span> Você é Técnico Agrícola em missão. Cada fase = um problema real de campo. Escolha a resposta técnica correta. Acertos seguidos = <span style={{color:ORANGE}}>COMBO 🔥</span> e XP extra. Erros custam HP. Clique em "Ver Explicação Técnica" para aprender com dados reais. Complete os 10 Mundos para receber seu Certificado!
        </div>
        <button onClick={()=>{if(name.trim())setScreen("game");}} disabled={!name.trim()}
          style={{...PF,width:"100%",padding:"14px",fontSize:13,letterSpacing:2,cursor:name.trim()?"pointer":"not-allowed",
            background:name.trim()?"#052a05":"#111",color:name.trim()?GREEN:GRAY,
            border:`2px solid ${name.trim()?GREEN:BORDER}`,borderRadius:2}}>
          {name.trim()?`▶ START — ${name.toUpperCase()}`:"INSIRA SEU NOME PARA CONTINUAR"}
        </button>
      </div>
    </div>
  );

  if(screen==="over")return(
    <div style={{...PF,background:"#0d0002",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:RED,padding:20,textAlign:"center"}}>
      <style>{STYLE}</style>
      <div style={{fontSize:52,animation:"shake 0.6s infinite"}}>💀</div>
      <div style={{fontSize:18,color:"#ff3333",margin:"14px 0"}}>GAME OVER</div>
      <div style={{color:GRAY,fontSize:11,maxWidth:360,lineHeight:1.9,marginBottom:14}}>
        Suas decisões causaram danos sérios ao ecossistema, {name}. Revise e tente novamente!
      </div>
      <div style={{background:"#1a0004",border:"1px solid #5a0010",padding:12,borderRadius:4,marginBottom:14,fontSize:10,color:GRAY}}>
        Fase {phase+1}/10 • Score: {score} • Lv.{level} • Acertos: {totalRight}
      </div>
      <button onClick={restart} style={{...PF,background:"#1a0004",color:RED,border:`2px solid ${RED}`,padding:"10px 28px",cursor:"pointer",fontSize:13,borderRadius:2}}>▶ TENTAR NOVAMENTE</button>
    </div>
  );

  if(screen==="phaseclear")return(
    <div style={{...PF,background:BG,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:GREEN,padding:20,textAlign:"center"}}>
      <style>{STYLE}</style>
      <div style={{fontSize:52,animation:"pop 0.8s infinite"}}>⭐</div>
      <div style={{fontSize:16,color:GOLD,margin:"12px 0"}}>{ph.world} — COMPLETO!</div>
      <div style={{fontSize:12,color:TEAL,marginBottom:12}}>{ph.title}</div>
      <div style={{background:CARD,border:`1px solid ${GREEN}`,padding:16,borderRadius:4,marginBottom:16,fontSize:10,color:GRAY,minWidth:260}}>
        <div>XP: <span style={{color:GOLD}}>{xp}</span> / {level*150} • Nível: <span style={{color:BLUE}}>Lv.{level}</span></div>
        <div>HP: <span style={{color:GREEN}}>{hp}/100</span> • Score: <span style={{color:ORANGE}}>{score}</span></div>
        <div>Acertos total: <span style={{color:TEAL}}>{totalRight}</span></div>
        {phase+1<PHASES.length&&<div style={{marginTop:8,color:TEAL}}>Próximo: {PHASES[phase+1].title}</div>}
      </div>
      <button onClick={nextPhase} style={{...PF,background:"#052a05",color:GREEN,border:`2px solid ${GREEN}`,padding:"12px 28px",cursor:"pointer",fontSize:12,borderRadius:2}}>
        {phase+1>=PHASES.length?"🏆 VER RESULTADO FINAL":`▶ ${PHASES[phase+1]&&PHASES[phase+1].world}: ${PHASES[phase+1]&&PHASES[phase+1].title}`}
      </button>
    </div>
  );

  if(screen==="victory")return(
    <div style={{...PF,background:"#020d02",minHeight:"100vh",color:GREEN,padding:20,textAlign:"center"}}>
      <style>{STYLE}</style>
      <div style={{maxWidth:560,margin:"0 auto"}}>
        <div style={{fontSize:60,animation:"pop 1s infinite",display:"inline-block"}}>🏆</div>
        <div style={{fontSize:20,color:GOLD,margin:"12px 0",letterSpacing:3}}>PARABÉNS!</div>
        <div style={{fontSize:12,color:TEAL,marginBottom:12}}>TÉCNICO AGRÍCOLA COMPLETO — LV.{level}</div>
        <div style={{background:"#040d04",border:`2px solid ${GOLD}`,borderRadius:8,padding:24,marginBottom:20}}>
          <div style={{fontSize:36,marginBottom:8}}>📜</div>
          <div style={{fontSize:14,color:GOLD,marginBottom:6}}>CERTIFICADO DE EXCELÊNCIA</div>
          <div style={{color:GREEN,fontSize:12}}>Certifica-se que</div>
          <div style={{fontSize:18,color:"#fff",margin:"6px 0"}}>{name.toUpperCase()}</div>
          <div style={{color:GREEN,fontSize:10,lineHeight:2}}>
            completou as 10 fases do AgroTech RPG<br/>
            demonstrando domínio em solo, água, fertilizantes,<br/>
            agroecologia e gestão integrada da propriedade rural.<br/><br/>
            <span style={{color:TEAL}}>Companheiro: {pet.emoji} {pet.label}</span><br/>
            <span style={{color:ORANGE}}>Score Final: {score.toLocaleString()} pts</span><br/>
            <span style={{color:GOLD}}>Acertos: {totalRight}/100 questões</span><br/>
            <span style={{color:GRAY}}>HP Final: {hp}/100</span>
          </div>
        </div>
        <div style={{background:"#020d02",border:`1px solid ${GREEN}44`,borderRadius:4,padding:16,marginBottom:16,fontSize:10,color:GRAY,lineHeight:2,textAlign:"left"}}>
          <div style={{color:GOLD,marginBottom:8,textAlign:"center"}}>🌍 SEU IMPACTO SE TODOS APLICASSEM O QUE VOCÊ APRENDEU:</div>
          ✅ -60% de erosão nas bacias agrícolas da região<br/>
          ✅ Recuperação de nascentes em 3-5 anos com APP preservada<br/>
          ✅ -30% no uso de agrotóxicos via MIP e rotação de mecanismos<br/>
          ✅ +25% de produtividade por solo bem manejado<br/>
          ✅ Sequestro de 1-2 t C/ha/ano no plantio direto<br/>
          ✅ R$78.400/ano de serviços ecossistêmicos gratuitos por 100ha<br/>
          ✅ Rio mais limpo, lençol mais alto, futuro mais seguro 🌱
        </div>
        <button onClick={restart} style={{...PF,background:"#052a05",color:GREEN,border:`2px solid ${GREEN}`,padding:"12px 32px",cursor:"pointer",fontSize:12,borderRadius:2}}>▶ JOGAR NOVAMENTE</button>
      </div>
    </div>
  );

  if(!ph||!q)return null;

  return(
    <div style={{...PF,background:BG,minHeight:"100vh",color:"#e0e0e0"}}>
      <style>{STYLE}</style>
      <div style={{background:"#0d0d1a",borderBottom:`2px solid ${BORDER}`,padding:"6px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,fontSize:9}}>
          <span style={{color:GOLD}}>🌾 {name.toUpperCase()}</span>
          <span style={{color:ORANGE}}>⭐ {score}</span>
          <span style={{color:TEAL}}>{ph.world} • Q{qIdx+1}/{totalQ}</span>
          <span style={{color:GRAY}}>Lv.{level} {pet.emoji}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div>
            <div style={{fontSize:8,color:GREEN,marginBottom:2}}>HP {hp}/100{streak>=2&&<span style={{color:ORANGE}}> 🔥x{streak}</span>}</div>
            <Bar v={hp} max={100} color={hp>50?"#22c55e":hp>25?"#f97316":"#ef4444"}/>
          </div>
          <div>
            <div style={{fontSize:8,color:BLUE,marginBottom:2}}>XP {xp}/{level*150}</div>
            <Bar v={xp} max={level*150} color={BLUE}/>
          </div>
        </div>
      </div>

      <div style={{maxWidth:640,margin:"0 auto",padding:"10px 12px"}}>
        <div style={{background:`${ph.color}22`,border:`1px solid ${ph.accent}55`,borderRadius:4,padding:"8px 12px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <span style={{fontSize:14}}>{ph.icon}</span>
              <span style={{fontSize:11,color:GOLD,marginLeft:8}}>{ph.title}</span>
              <div style={{fontSize:9,color:GRAY,marginTop:2}}>{ph.subtitle}</div>
            </div>
            <div style={{fontSize:9,color:TEAL}}>Fase {phase+1}/10</div>
          </div>
        </div>

        <div style={{background:`linear-gradient(180deg,#001028 0%,${ph.color}44 100%)`,border:`2px solid ${ph.accent}44`,borderRadius:4,padding:"8px 6px",marginBottom:10,position:"relative",height:80,overflow:"hidden"}}>
          {[...Array(8)].map((_,i)=>(
            <div key={i} style={{position:"absolute",top:`${10+Math.random()*40}%`,left:`${i*12+2}%`,width:2,height:2,background:GOLD,animation:`blink ${1+i*0.4}s infinite`}}/>
          ))}
          <div style={{position:"absolute",bottom:0,left:0,right:0,height:18,background:"#1a3a0a"}}/>
          <div style={{position:"absolute",bottom:18,left:0,right:0,height:2,background:"#2a5a1a"}}/>
          {[0,25,50,75,100].map(p=>(
            <div key={p} style={{position:"absolute",bottom:18,left:`${p}%`,fontSize:10,color:walkPos>=p?GOLD:BORDER}}>🚩</div>
          ))}
          <div style={{position:"absolute",bottom:17,left:`${walkPos}%`,transition:"left 0.7s ease",textAlign:"center",lineHeight:1}}>
            <div style={{fontSize:20,animation:"walk 0.5s infinite"}}>👨‍🌾</div>
            <div style={{fontSize:12,animation:"floatpet 1.2s infinite",marginTop:-6}}>{pet.emoji}</div>
          </div>
          <div style={{position:"absolute",bottom:16,right:10,fontSize:16}}>🏁</div>
          <div style={{position:"absolute",top:5,left:8,right:8,fontSize:8,color:"#88aacc",lineHeight:1.5}}>
            {ph.story.slice(0,90)}...
          </div>
        </div>

        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:4,padding:12,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div style={{fontSize:9,color:PURPLE}}>Q{qIdx+1} — {"★".repeat(q.diff)}{"☆".repeat(5-q.diff)}</div>
            <div style={{fontSize:9,color:TEAL}}>+{q.xp} XP</div>
          </div>
          <div style={{fontSize:11,color:"#ddd",lineHeight:1.8,marginBottom:8}}>{q.q}</div>
          {q.ctx&&(
            <div style={{background:"#0a0a1a",border:`1px solid ${BORDER}`,borderRadius:2,padding:"6px 10px",fontSize:9,color:GRAY,lineHeight:1.7}}>
              {q.ctx}
            </div>
          )}
        </div>

        <div style={{display:"grid",gap:7,marginBottom:10}}>
          {q.opts.map((opt,i)=>{
            let bg=CARD,border=BORDER,col="#bbb";
            if(answered!==null){
              if(i===q.correct){bg="#031a03";border=GREEN;col=GREEN;}
              else if(i===answered&&i!==q.correct){bg="#1a0303";border=RED;col=RED;}
              else{col="#444";border="#1a1a2e";}
            }
            return(
              <button key={i} onClick={()=>handleAnswer(i)} disabled={answered!==null}
                style={{...PF,background:bg,border:`1px solid ${border}`,color:col,
                  padding:"9px 12px",cursor:answered!==null?"default":"pointer",
                  textAlign:"left",fontSize:10,lineHeight:1.6,borderRadius:2}}>
                <span style={{color:border,marginRight:8,fontWeight:"bold"}}>[{["A","B","C","D"][i]}]</span>
                {opt.replace(/^[A-D]\.\s*/,"")}
                {answered!==null&&i===q.correct&&" ✅"}
                {answered!==null&&i===answered&&i!==q.correct&&" ❌"}
              </button>
            );
          })}
        </div>

        {answered!==null&&(
          <div style={{background:correct?"#021502":"#150202",border:`1px solid ${correct?GREEN:RED}44`,borderRadius:4,padding:12,marginBottom:10}}>
            <div style={{fontSize:10,color:correct?GREEN:RED,marginBottom:6}}>
              {correct?"✅ RESPOSTA CORRETA!":"❌ RESPOSTA INCORRETA"}
              {streak>=3&&correct&&<span style={{color:ORANGE}}> 🔥 COMBO x{streak}!</span>}
            </div>
            <button onClick={()=>setShowWhy(!showWhy)}
              style={{...PF,background:"transparent",border:`1px solid ${TEAL}`,color:TEAL,padding:"4px 12px",cursor:"pointer",fontSize:9,borderRadius:2,marginBottom:6}}>
              {showWhy?"▲ OCULTAR EXPLICAÇÃO TÉCNICA":"▼ VER EXPLICAÇÃO TÉCNICA"}
            </button>
            {showWhy&&(
              <div style={{fontSize:10,color:"#aac8aa",lineHeight:1.9,borderTop:`1px solid ${BORDER}`,paddingTop:8,marginTop:6,whiteSpace:"pre-line"}}>
                {q.why}
              </div>
            )}
            <div style={{marginTop:8}}>
              <button onClick={nextQ}
                style={{...PF,background:correct?"#031a03":"#1a0a02",color:correct?GREEN:ORANGE,
                  border:`1px solid ${correct?GREEN:ORANGE}`,padding:"8px 20px",cursor:"pointer",fontSize:11,borderRadius:2}}>
                {qIdx+1>=totalQ?"⭐ COMPLETAR FASE":"▶ PRÓXIMA QUESTÃO"}
              </button>
            </div>
          </div>
        )}

        <div style={{background:"#070710",border:`1px solid ${BORDER}`,borderRadius:2,padding:"6px 8px",fontSize:8,color:GRAY,maxHeight:44,overflowY:"auto",marginBottom:8}}>
          {log.length===0?"[ LOG DE COMBATE ]":log.map((l,i)=><div key={i}>{l}</div>)}
        </div>

        <div style={{display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap"}}>
          {PHASES.map((p,i)=>(
            <div key={i} style={{textAlign:"center"}}>
              <div style={{fontSize:i===phase?12:8,marginBottom:2,opacity:i<=phase?1:0.3}}>{p.icon}</div>
              <div style={{width:i===phase?18:14,height:i===phase?8:5,margin:"0 auto",
                background:i<phase?GREEN:i===phase?GOLD:"#222",
                border:`1px solid ${i===phase?GOLD:BORDER}`,borderRadius:1}}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
