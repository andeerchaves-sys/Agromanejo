  ctx:"1cm³ de solo saudável: >1km de hifas de FMA. Zona de captação de nutrientes sem micorriza: 2-4mm de raio. Com micorriza: 20-40cm de raio. FMA reduzem em 30-70% após cada aragem profunda.",
  opts:["A. FMA são fungos que causam doenças de raiz em solos ácidos — sua destruição pelo arado é benéfica para a produção de soja","B. FMA são simbiontes que estendem a zona de absorção radicular em 100-1.000x — fundamentais para P, Zn e Cu. Cada aragem rompe a rede contínua de hifas que leva 2-4 anos para se reconstituir; fungicidas triazóis em alta dose reduzem FMA em 30-70% adicionalmente","C. FMA são importantes apenas para culturas perenes como café e frutíferas — gramíneas e leguminosas anuais como soja e milho não formam simbiose micorrízica","D. FMA têm impacto apenas em solos com pH abaixo de 5,0 — em pH 6,0-6,5 como a maioria das lavouras comerciais, a simbiose é irrelevante para a absorção de nutrientes","E. FMA aumentam a absorção de P mas causam competição por água com as raízes — em anos secos, sua presença é contraindicada e a destruição pelo arado tem efeito benéfico sobre a eficiência hídrica das plantas"],
  correct:1,xp:35,diff:3,
  why:"💡 FMA (Glomerales): hifas de 2-7 μm exploram 20cm de raio vs. 4mm das raízes. Para P (que move por difusão lenta: 0,1-0,3mm/dia no solo), as micorrizas alcançam solo ainda rico em P enquanto as raízes 'esgotaram' a zona próxima. Em solos com P < 6 mg/dm³: produtividade com FMA ativa pode ser 30-60% maior com a mesma adubação. A aragem anual destroi a rede em um único passe — o SPD com 10+ anos tem rede de FMA 3-5x mais densa que solo convencional."},
  {q:"Você propõe o TeaBAG Index (TBI) como experimento prático para demonstrar a biologia do solo aos pais. Como o protocolo funciona e o que os resultados revelam?",
  ctx:"Protocolo publicado em Methods in Ecology and Evolution (Keuskamp et al., 2013). Materiais: saquinhos Lipton Yellow Label (chá verde) + rooibos padronizados. Validado em 1.787 experimentos em 60 países.",
  opts:["A. Enterrar saquinhos de chá em solo úmido e verificar a cor da infusão após 1 hora — chá mais escuro indica mais matéria orgânica disponível para as plantas","B. Medir o pH do solo antes e depois de enterrar os saquinhos — a mudança de pH indica atividade de bactérias nitrificantes que são os principais decompositores da matéria orgânica","C. Enterrar pares padronizados de chá verde + rooibos a 8cm por 90 dias, pesar seco antes e depois. Alta decomposição do chá verde (>60% degradado) = biota ativa = solo saudável. Resultado visual: na mata nativa 80-90% degradado vs. 20-30% na lavoura convencional","D. O TeaBAG Index mede apenas a atividade fúngica — para medir atividade bacteriana é necessário usar saquinhos de papel filtro com celulose pura, não chá verde","E. O protocolo exige laboratório de análise isotópica com espectrômetro de massa para quantificar o carbono residual nos saquinhos — não é adaptável para uso em campo por agricultores"],
  correct:2,xp:35,diff:2,
  why:"💡 O TBI é elegante por usar materiais padronizados e baratos: o chá verde (substâncias lábeis) indica atividade microbiana geral; o rooibos (compostos recalcitrantes) indica capacidade de humificação. Dr (decomposition rate) > 0,6 = solo saudável. Na prática de campo: os pais que desenterram os saquinhos, pesam e calculam a porcentagem degradada tornam-se agentes da ciência — é o experimento mais eficaz de educação ambiental em propriedades rurais."},
  {q:"Um pai pergunta diretamente: 'O senhor disse que agrotóxico pode matar os microrganismos do solo. Mas meu marido usa muito fungicida — está destruindo o solo da nossa fazenda?' Como responder com honestidade técnica, sem alarmismo e sem minimizar o problema?",
  ctx:"Meta-análise de 126 estudos (Zaller et al., 2021): fungicidas triazóis reduziram FMA em média 21%; benzimidazóis (carbendazim): até 67%. Efeito cumulativo em 5 anos de uso intensivo: redução de até 85%.",
  opts:["A. Não há evidência científica de que agrotóxicos aprovados pela ANVISA causam dano à biota do solo — se o produto é registrado, é seguro","B. O marido dela está certamente destruindo o solo — qualquer uso de fungicida por mais de 2 anos consecutivos causa colapso irreversível da biota","C. Depende do produto, dose e frequência: triazóis em alta dose e benzimidazóis têm impacto documentado nos FMA. O impacto é gradual e cumulativo — e é gerenciável: usar a menor dose eficaz, priorizar fungicidas com menor impacto em FMA (SDHI em doses normais), e inocular FMA (R$25-40/ha) após safras com uso intenso","D. Fungicidas agem exclusivamente na parte aérea das plantas — o solo é completamente protegido por sua capacidade tampão e os microrganismos do solo não têm os mesmos receptores que os fungos foliares","E. O impacto existe apenas em solos arenosos com menos de 1% de MO — solos argilosos e solos com boa matéria orgânica são completamente resistentes ao impacto de fungicidas na biota"],
  correct:2,xp:40,diff:3,
  why:"💡 A resposta honesta: sim, alguns fungicidas têm impacto documentado na biota benéfica do solo. Alto impacto (evitar ou reduzir): benzimidazóis (carbendazim — também restrito pela ANVISA), fumigantes. Médio impacto (usar com critério): triazóis em altas doses repetidas. Baixo impacto: SDHI (carboxamidas) em doses normais. Estratégia de mitigação: dose mínima eficaz + inoculação de FMA após safras intensas + MO alta (>2,5%) acelera recuperação. O técnico que responde 'é seguro porque tem registro' está ignorando evidência científica robusta."},
  {q:"Como calcular o valor econômico dos serviços ecossistêmicos prestados pelo solo biologicamente ativo de 100ha em comparação com um solo degradado?",
  ctx:"Solo saudável vs. degradado: mineralização microbiana extra = 60 kgN + 12 kgP₂O₅ + 16 kgK₂O/ha/ano. Controle biológico de doenças de raiz (Trichoderma, Bacillus): economia de 40% em fungicidas de solo. Infiltração superior: menor dependência de irrigação.",
  opts:["A. Serviços ecossistêmicos não têm valor econômico mensurável — são externalidades positivas que o mercado não consegue precificar adequadamente","B. Valor = preço de mercado do solo por m³ × volume biologicamente ativo × fator de biodiversidade — metodologia padronizada pela FAO para valoração de solos agrícolas","C. Mineralização extra (R$274/ha/ano) + controle biológico (R$240/ha) + infiltração melhor (R$120/ha) + menor erosão (R$150/ha) = R$784/ha/ano de serviço gratuito prestado pelo solo saudável. Em 100ha: R$78.400/ano. Custo para manter o solo saudável (SPD + cobertura): ~R$130/ha/ano","D. O valor dos serviços ecossistêmicos do solo saudável é de R$50/ha/ano — calculado pela diferença de custo de fertilizante entre o solo saudável e o degradado, dividido pelo índice de eficiência microbiana","E. Serviços ecossistêmicos só têm valor quando certificados por auditoria ISO 14001 — sem certificação, não podem ser contabilizados no balanço econômico da propriedade"],
  correct:2,xp:42,diff:3,
  why:"💡 A valoração econômica de serviços ecossistêmicos é um campo científico robusto (TEEB — The Economics of Ecosystems and Biodiversity, ONU). Para o solo: mineralização microbiana (N, P, K liberados grátis pelos decompositores) + controle biológico (Trichoderma, Bacillus suprimindo Fusarium, Pythium e Rhizoctonia) + macroporosidade (minhocas criando canais de infiltração). Em 20 anos para 100ha: R$78.400/ano × 20 = R$1,568 MILHÃO em serviços gratuitos. Custo do SPD: R$130/ha/ano × 100ha × 20 = R$260.000. ROI do solo saudável: 6:1."},
  {q:"Explique a Fixação Biológica de Nitrogênio (FBN) da soja de forma tecnicamente precisa, incluindo o mecanismo bioquímico e a escala econômica para o Brasil.",
  ctx:"40 milhões de hectares de soja no Brasil dispensam adubação nitrogenada graças à FBN. Economia estimada: R$40-50 bilhões/ano em ureia não importada.",
  opts:["A. A FBN ocorre quando as raízes da soja absorvem N₂ dissolvido na água do solo pela diferença de potencial osmótico — não envolve bactérias e é característica genética de todas as leguminosas","B. Bradyrhizobium japonicum/elkanii usa a enzima nitrogenase para converter N₂ (tripla ligação inquebrável para as plantas) em NH₃ (amônia) em simbiose obrigatória dentro dos nódulos radiculares; a soja fornece fotossintatos (ATP) à bactéria em troca de 200-300 kgN/ha/safra — eliminando completamente a necessidade de ureia","C. A FBN na soja ocorre de forma livre na rizosfera, sem formação de nódulos — é realizada por Azospirillum brasilense que coloniza as raízes externamente e fixa N₂ ambiental","D. Bradyrhizobium funciona apenas em solos com pH acima de 7,0 — em solos ácidos como os do Cerrado, a soja depende de adubação nitrogenada complementar de pelo menos 80 kgN/ha para manter produtividade acima de 50 sc/ha","E. A FBN da soja fixa em média 50-80 kgN/ha/safra — suficiente para complementar a adubação mineral, mas não para dispensá-la completamente"],
  correct:1,xp:36,diff:2,
  why:"💡 A equação da nitrogenase: N₂ + 8H⁺ + 8e⁻ + 16ATP → 2NH₃ + H₂ + 16ADP + 16Pi. Essa reação exige enorme gasto energético — por isso a soja 'paga' com 30-40% dos fotossintatos produzidos. Nódulos rosados/vermelhos = leghemoglobina ativa = fixação ocorrendo. Nódulos verdes/marrons = inativos. A FBN substitui completamente a adubação nitrogenada na soja brasileira: 40M ha × 250 kgN/ha = 10 bilhões de kg de N grátis por safra. Para perspectiva: toda a produção de ureia do Brasil não cobriria nem 30% dessa demanda."},
  {q:"BOSS FASE 6: Um produtor quer saber o impacto econômico de recuperar a biologia do solo de sua propriedade de 100ha ao longo de 20 anos, comparando SPD vs. convencional. Como estruturar esse cálculo integrando serviços ecossistêmicos, custos e produtividade?",
  ctx:"SPD 20 anos vs. convencional: produtividade média SPD +15% após 5 anos; custo de preparo do solo SPD = zero vs. R$280/ha/ano no convencional; serviços ecossistêmicos do solo vivo = R$784/ha/ano calculados acima.",
  opts:["A. O SPD tem retorno econômico apenas se combinado com certificação orgânica — sem premium de preço, os custos de implantação superam os benefícios em 20 anos","B. O cálculo correto soma: economia em preparo de solo (R$280/ha/ano × 100ha × 20 anos = R$560.000) + serviços ecossistêmicos (R$784/ha/ano × 100ha × 20 = R$1.568.000) + produtividade extra após ano 5 (15% × R$5.600/ha/ano × 100ha × 15 anos = R$1.260.000) − custo de implantação do SPD (~R$50.000 único) = R$3.338.000 de benefício em 20 anos","C. O SPD tem payback de 15 anos em condições ideais — não é recomendado para produtores com horizonte de planejamento menor que 20 anos","D. O cálculo não é possível sem dados de longo prazo de produtividade específicos para o Piauí — extrapolações de dados do Sul do Brasil não são válidas para o Cerrado","E. O benefício econômico do SPD é real mas modesto: R$50.000 em 20 anos para 100ha — justifica a adoção apenas por produtores com motivação ambiental além da financeira"],
  correct:1,xp:50,diff:4,
  why:"💡 O cálculo integrado revela o real ROI do SPD: (1) Economia em preparo: R$280/ha × 100ha × 20 anos = R$560.000 (combustível, mão de obra, manutenção de máquinas). (2) Serviços ecossistêmicos (biologia ativa, FBN, micorrizas, minhocas): R$784/ha/ano × 100ha × 20 = R$1.568.000. (3) Produtividade: nos primeiros 5 anos, resultado similar; a partir do ano 5, +15% × R$5.600/ha margem × 100ha × 15 anos = R$1.260.000. Total: ~R$3.388.000 de benefício − R$50.000 de implantação = ROI de 6.676% em 20 anos. Por isso o SPD hoje cobre mais de 35 milhões de ha no Brasil."},
]},

{id:7,title:"World 7: Venenos, Receitas e Responsabilidades",subtitle:"Agrotóxicos & Toxicologia",icon:"🧪",world:"MUNDO 7",color:"#4A1060",accent:"#C084FC",
story:"ALERTA VERMELHO! Tomates interditados com resíduo 5× o LMR. 12 produtores em pânico. Câmeras de TV. E um trabalhador foi hospitalizado. Você tem uma hora para ser o mais preciso da sua vida.",
questions:[
  {q:"O laudo da ANVISA indica: resíduo de clorpirifós no tomate = 2,4 mg/kg. O LMR estabelecido é 0,5 mg/kg. O produtor argumenta: 'A diferença é pequena — são apenas 1,9 mg a mais por kilo.' Como refutar esse argumento com o conceito técnico do LMR?",
  ctx:"IDA (Ingestão Diária Aceitável) do clorpirifós: 0,001 mg/kg pc/dia. Peso corporal médio: 60kg. Consumo médio de tomate pelo brasileiro: 10,7g/dia. Fator de segurança da IDA: 100× sobre o NOAEL em animais.",
  opts:["A. O argumento do produtor é válido para adultos saudáveis — 1,9 mg/kg acima do LMR é clinicamente irrelevante; o LMR tem margem de segurança de 100× que já absorve esse desvio","B. O LMR = IDA × peso corporal / consumo do alimento = 0,001 × 60 / 0,0107 = 5,6 mg/kg; a ANVISA definiu 0,5 mg/kg (mais conservador). Com 2,4 mg/kg, a dose diária pelo tomate = 43% da IDA de um único alimento — somando outros alimentos com resíduos (efeito coquetel), a IDA diária total pode ser ultrapassada; crianças (20kg) chegam a 130% da IDA só pelo tomate","C. O LMR é definido pelo limite de detecção dos equipamentos de laboratório — qualquer valor acima do LMR é apenas erro analítico sem significado toxicológico","D. O problema não é a concentração de 2,4 mg/kg mas o fato de que clorpirifós não está autorizado para tomate no Brasil — se estivesse, qualquer nível seria aceitável","E. O desvio de 1,9 mg/kg acima do LMR é problemático apenas para pessoas com deficiência genética na enzima acetilcolinesterase — para a população geral, o clorpirifós abaixo de 5 mg/kg não tem efeito agudo"],
  correct:1,xp:32,diff:3,
  why:"💡 O LMR não é um 'limite de segurança com margem' — ele JÁ É calculado conservadoramente: LMR = IDA × peso corporal / consumo do alimento. A IDA já aplica fator de segurança 100× sobre o NOAEL em animais. Com 2,4 mg/kg (4,8× o LMR), a dose pelo tomate supera 43% da IDA em adultos e 130% em crianças de 20kg. Adicione exposição por outros alimentos com resíduos (efeito coquetel) e a IDA diária total fica claramente comprometida, especialmente para populações vulneráveis."},
  {q:"O produtor aplicou clorpirifós 4 dias antes da colheita. O período de carência (PC) é 14 dias. Ele diz: 'Eu precisava colher porque o preço estava bom — 4 dias a menos não faz diferença.' Como refutar com cálculo de degradação?",
  ctx:"Meia-vida do clorpirifós em frutos de tomate: 3-5 dias. Resíduo estimado logo após a aplicação: ~13 mg/kg (dose normal de 1,5 L/ha de produto comercial 480g/L).",
  opts:["A. O PC de 14 dias é burocrático e definido com margem excessiva de segurança — 4 dias a menos tem impacto mínimo nos resíduos, como confirma o resultado encontrado de 2,4 mg/kg que está próximo do LMR","B. Usando cinética de primeira ordem: C(t) = C₀ × e^(-0,693t/t½). No dia 4: C = 13 × e^(-0,693×4/4) = 13 × 0,5 = 6,5 mg/kg (13× o LMR). No dia 14: C = 13 × e^(-0,693×14/4) = 13 × 0,086 = 1,1 mg/kg (ainda próximo ao LMR de 0,5 — mostrando que 14 dias é o MÍNIMO absoluto para esse produto/cultura)","C. A degradação do clorpirifós é linear: perde 0,5 mg/kg por dia. No dia 4: 13 − (4 × 0,5) = 11 mg/kg. No dia 14: 13 − (14 × 0,5) = 6 mg/kg — ainda muito acima do LMR, confirmando que o PC de 14 dias é insuficiente","D. No dia 4 o resíduo seria de 6,5 mg/kg pela lei das cinéticas de primeira ordem, mas toda a diferença entre 6,5 e 2,4 mg/kg se explica pelo fato de que a chuva no dia 3 lavou grande parte do produto — o produtor tomou uma decisão tecnicamente acertada","E. O cálculo de degradação não é aplicável porque o clorpirifós se redistribui sistemicamente pelo fruto — a concentração na polpa é sempre 10× menor que na casca, onde a análise é feita"],
  correct:1,xp:35,diff:3,
  why:"💡 Degradação de primeira ordem: C(t) = C₀ × e^(-kt), onde k = ln(2)/t½. Com t½ = 4 dias e C₀ = 13 mg/kg: Dia 4 = 6,5 mg/kg (13× o LMR de 0,5!). Dia 8 = 3,25 mg/kg. Dia 12 = 1,6 mg/kg. Dia 14 = 1,1 mg/kg (ainda 2× o LMR). O PC de 14 dias é o MÍNIMO para chegar próximo do LMR com essa meia-vida — e mesmo assim ainda há resíduo. O produtor que colhe no dia 4 entrega produto com 13× o LMR. 'Preço bom' não é justificativa legal ou ética."},
  {q:"Um trabalhador rural apresenta: pupilas fortemente contraídas (miose), salivação intensa, lacrimejamento, tremores musculares, pulso lento (bradicardia) e dificuldade respiratória após manipular metamidofós (organofosforado — Classe I) sem luvas ou respirador. Qual é o diagnóstico e o protocolo de emergência correto?",
  ctx:"DL50 oral do metamidofós (ratos): 13 mg/kg (extremamente tóxico). EPI ausente: sem luvas, sem respirador, sem macacão. Via de exposição provável: dérmica + inalatória.",
  opts:["A. Reação alérgica anafilática ao organofosforado — administrar anti-histamínico e corticoide; a sintomatologia desaparece em 30-60 minutos sem necessidade de antídoto específico","B. Intoxicação aguda por organofosforado (síndrome colinérgica — inibição da acetilcolinesterase). Protocolo: (1) remover da exposição + retirar roupas contaminadas; (2) lavar copiosamente com água e sabão; (3) SAMU 192 imediatamente; (4) informar o nome do produto ao médico — antídoto é atropina (bloqueador muscarínico) + pralidoxima (reativa colinesterase se dado em <24h)","C. Hipoglicemia grave por esforço físico intenso com desidratação — administrar glicose por via oral e manter o trabalhador deitado à sombra","D. Crise de ansiedade com hiperventilação — manter o trabalhador calmo, oferecer respiração em saco e aguardar a resolução espontânea dos sintomas","E. Intoxicação leve por carbamato (não por organofosforado, pois carbamatos causam miose e organofosforados causam midríase) — os sintomas se revertem espontaneamente em 4-6 horas sem necessidade de atropina"],
  correct:1,xp:38,diff:2,
  why:"💡 Síndrome colinérgica por organofosforado: a inibição da acetilcolinesterase causa acúmulo de acetilcolina nas sinapses. Os efeitos muscarínicos (SLUDGE): Salivação, Lacrimejamento, Urinação, Defecação, vômito GI, Edema pulmonar + bradicardia + miose. Nicotínicos: fasciculações, fraqueza muscular, paralisia. SNC: convulsões, coma. ANTÍDOTO: (1) Atropina (bloqueador muscarínico) — dose até obter atropinização (boca seca, midríase leve, FC > 80); (2) Pralidoxima (PAM) — reativa a colinesterase antes da 'aging' (24h). Após a aging, a inibição é irreversível. É emergência médica com risco de óbito."},
  {q:"Um produtor usa EPI incompleto para aplicar Mancozeb 800g/kg (fungicida): sem máscara respiratória. Ele argumenta: 'A faixa da embalagem é azul — Classe III, moderadamente tóxico. Máscara é exagero.' Como você responde tecnicamente?",
  ctx:"DL50 oral do Mancozeb: > 5.000 mg/kg (Classe III). IARC: Grupo 2B (possível carcinogênico humano). Interfere na produção de hormônios tireoidianos (EPA, 2018). Formulado contém solventes aromáticos voláteis.",
  opts:["A. O produtor tem razão — a classificação toxicológica Classe III confirma segurança para uso sem máscara respiratória; a ANVISA não exigiria a faixa azul se o produto representasse risco inalatório","B. A Classe III indica toxicidade aguda baixa (DL50 > 5.000 mg/kg), mas não avalia efeitos crônicos: Mancozeb é classificado como possível carcinogênico (IARC 2B), perturbador endócrino tireoidiano e seus solventes aromáticos voláteis causam dano hepático por exposição inalatória crônica. A bula especifica o EPI necessário — não a 'faixa colorida'","C. A classificação toxicológica inclui riscos inalatórios — se o produto fosse perigoso por inalação, seria Classe I ou II; a faixa azul garante que o risco inalatório é desprezível","D. O risco do Mancozeb é exclusivamente dérmico (contato com a pele) — não há vapor do produto em condições normais de temperatura; a máscara é dispensável e apenas aumenta o estresse térmico do aplicador","E. A máscara só é obrigatória quando o produto é aplicado em espaços fechados (estufas, armazéns) — em aplicação a campo aberto, a dispersão do ar ambiente elimina qualquer risco inalatório"],
  correct:1,xp:35,diff:2,
  why:"💡 A classificação toxicológica (DL50 oral) mede TOXICIDADE AGUDA apenas — não avalia toxicidade crônica, carcinogenicidade, disrupção endócrina nem inhalation toxicity. Mancozeb: IARC 2B (evidência limitada de carcinogenicidade humana), interfere na biossíntese de T4/T3 (hormônios tireoidianos) com exposição crônica (EPA 2018), e seus ingredientes inertes incluem solventes aromáticos voláteis que são hepatotóxicos por via inalatória. A NR-31 determina que o EPI deve ser o especificado na bula do produto — não baseado apenas na 'faixa colorida'."},
  {q:"Como calcular o volume total de calda e a quantidade de produto para aplicação de um fungicida em 15ha? Produto: Priori Xtra — dose de bula: 300mL/ha; volume de calda: 150 L/ha. O pulverizador tem tanque de 800L.",
  ctx:"A calibração do pulverizador mostrou que os bicos estão aplicando 160 L/ha (6,7% acima do recomendado). O técnico precisa decidir se recalibra os bicos ou ajusta a dose do produto.",
  opts:["A. Volume de calda: 15 × 150 = 2.250L (2,8 tanques). Produto: 15 × 300 = 4.500mL (4,5L). Com bicos aplicando 160 L/ha, a dose do produto por hectare seria 300/150 × 160 = 320mL/ha — 6,7% acima do recomendado, que está dentro da tolerância analítica e não requer recalibração","B. Volume de calda: 15 × 160 = 2.400L (3,0 tanques). Produto: 15 × 300 = 4.500mL. Com bicos a 160 L/ha, para manter a dose correta de 300mL/ha, a concentração no tanque deve ser recalculada: 300mL/160L × 800L = 1.500mL por tanque (em vez de 1.600mL); recalibrar os bicos é melhor para garantir uniformidade","C. Volume de calda: 15 × 150 = 2.250L. Produto total: 4.500mL. Com bicos a 160 L/ha, deve-se dobrar a dose do produto para compensar a diluição extra causada pelo volume maior","D. O volume de calda correto é 15ha × 300mL = 4.500L; a dose por hectare e o volume por hectare são calculados da mesma forma porque ambos são expressos em mL/ha","E. Com bicos descalibrados, a única solução válida é não realizar a aplicação até que novos bicos sejam instalados — qualquer ajuste na dose sem recalibração formal invalida a ART do técnico"],
  correct:1,xp:32,diff:3,
  why:"💡 Volume total correto: 15ha × 150 L/ha = 2.250L (2,8 tanques de 800L). Produto total: 15ha × 300mL/ha = 4.500mL (4,5L). Com bicos aplicando 160 L/ha (6,7% a mais): a concentração do produto na calda permanece a mesma (300mL por 150L = 2 mL/L). Com 160 L/ha, a dose aplicada seria 320mL/ha — 6,7% acima. A resposta B está correta: recalibrar é melhor, mas se não for possível, ajustar a concentração por tanque. Bico descalibrado em ±20% pode causar fitotoxicidade ou controle insuficiente — ambos com consequências econômicas e de resistência."},
  {q:"O que são os disruptores endócrinos e como a exposição crônica a agrotóxicos com esse mecanismo difere da toxicidade aguda avaliada pelo DL50?",
  ctx:"Exemplos de disruptores endócrinos em agrotóxicos: atrazina (altera hormônios sexuais em anfíbios a 0,1 ppb), DDT (ainda detectado no leite materno humano décadas após uso), clorpirifós (redução de QI em crianças em exposição pré-natal abaixo do LMR).",
  opts:["A. Disruptores endócrinos são substâncias que causam toxicidade aguda ao sistema endócrino — são detectados pela DL50 e pelos LMRs tradicionais, que já incluem essa categoria de risco","B. Disruptores endócrinos atuam em doses 100-10.000× abaixo da DL50, interferindo em receptores hormonais (estrogênio, andrógeno, tireoide) e causando efeitos de desenvolvimento, reprodução e neurológicos com latência de anos a décadas — invisíveis ao sistema de avaliação pelo DL50 que só mede efeitos agudos em 14 dias","C. Disruptores endócrinos são um conceito científico controverso sem consenso internacional — a maioria das agências reguladoras, incluindo a ANVISA, não utiliza esse critério na avaliação de agrotóxicos","D. A toxicidade endócrina crônica é sempre 1.000× menor que a toxicidade aguda — por isso os LMRs, que já aplicam fator de segurança de 100×, protegem adequadamente contra ambos os tipos de toxicidade","E. Disruptores endócrinos só causam efeitos adversos em organismos aquáticos como anfíbios e peixes — em mamíferos, o sistema endócrino tem redundância que elimina o risco de disrupção por compostos exógenos"],
  correct:1,xp:40,diff:4,
  why:"💡 A toxicologia clássica baseia-se no princípio de Paracelso: 'a dose faz o veneno'. Disruptores endócrinos desafiam esse paradigma: (1) Podem ter efeito não-monotônico (dose-resposta em U ou invertida — efeito máximo em dose baixa); (2) Atuam em janelas críticas do desenvolvimento (fetal, neonatal, puberdade) quando o sistema endócrino é mais vulnerável; (3) Latência longa entre exposição e manifestação do efeito (ex: DES — dietilestilbestrol: exposição in utero, câncer vaginal na filha 20 anos depois). O DL50 em ratos adultos por 14 dias não captura esses efeitos."},
  {q:"BOSS FASE 7: Como elaborar um Receituário Agronômico completo e válido para um fungicida em tomate? Quais elementos são obrigatórios e qual é a responsabilidade legal do técnico emissor?",
  ctx:"Lei 7.802/1989 (Lei dos Agrotóxicos) e Decreto 4.074/2002. CREA: ART obrigatória. O técnico tem responsabilidade civil, administrativa e eventualmente criminal.",
  opts:["A. O Receituário Agronômico precisa apenas do nome do produto, dose e assinatura do técnico — os demais campos são opcionais e variam por estado","B. Elementos obrigatórios (Art. 65, Decreto 4.074/2002): identificação do emitente com número do CREA + número da ART, identificação do produtor e da área, cultura, praga/doença alvo identificada em campo, produto (nome comercial + ingrediente ativo + dose), número de aplicações, intervalos, período de carência, EPI necessário conforme a bula, orientações de descarte de embalagem e data. Responsabilidade: civil (reparação de danos), administrativa (cassação do registro) e eventualmente criminal (Lei 9.605/98)","C. O Receituário Agronômico é apenas um documento comercial que autoriza a compra do produto — a responsabilidade pelo uso correto é exclusivamente do produtor rural","D. A ART só é necessária em receituários para produtos Classe I e II — produtos Classe III e IV podem ser receitados sem ART, pois o risco é considerado baixo pela legislação","E. O técnico pode emitir receituário mesmo sem visita ao campo — a análise de solo digital e o histórico de produção do sistema de gestão agrícola substituem a visita presencial para fins de responsabilidade técnica"],
  correct:1,xp:48,diff:4,
  why:"💡 O Receituário Agronômico é o documento mais importante da responsabilidade profissional do técnico agrícola. A ART (Anotação de Responsabilidade Técnica) registrada no CREA vincula juridicamente o profissional ao ato técnico. Se o produto causar: excesso de resíduo (responsabilidade civil + criminal), intoxicação do trabalhador (responsabilidade civil + trabalhista), dano ambiental (Lei 9.605/98), o técnico emissor é corresponsabilizado solidariamente. Nunca emita sem: visita presencial à área, diagnóstico fitossanitário presencial, preenchimento de todos os campos obrigatórios."},
]},

{id:8,title:"World 8 FINAL: Fazenda Esperança",subtitle:"Gestão Integrada da Propriedade",icon:"🏆",world:"MUNDO 8 — BOSS FINAL",color:"#0A3A0A",accent:"#4ADE80",
story:"FASE FINAL — O BOSS DE TODOS OS BOSSES! Você foi chamado para elaborar o Plano de Manejo Integrado da Fazenda Esperança: 500ha, bacia hidrográfica degradada, solo exausto, produtor endividado. Este é o maior desafio da sua carreira. TUDO que você aprendeu será usado agora!",
questions:[
  {q:"Antes de qualquer intervenção na Fazenda Esperança (500ha), qual é a sequência técnica obrigatória do diagnóstico integrado e por que ela é inegociável?",
  ctx:"Propriedade com 20 anos de soja convencional, solo degradado, bacia hidrográfica comprometida. Produtor endividado em R$800.000 quer 'começar a aplicar calcário logo'.",
  opts:["A. Começar imediatamente pelo calcário — o pH baixo é o problema mais urgente e qualquer diagnóstico adicional apenas atrasa a recuperação","B. Análise de solo em grade (1 amostra/ha) → levantamento topográfico → análise de qualidade da água → mapeamento de APP/RL via CAR/SIGEF → entrevistas sobre histórico → só então prescrever. Sem diagnóstico, a calagem pode ser aplicada onde o pH já está adequado e ignorada onde é mais urgente — desperdício de R$500.000+","C. Contratar imediatamente subsolagem em toda a área — a compactação é o problema universal de fazendas degradadas e pode ser corrigida antes do diagnóstico químico","D. Fazer apenas uma análise de solo composta (todas as amostras misturadas) para ter um valor médio de pH — mais rápido e economicamente viável para uma propriedade endividada","E. O diagnóstico não é tecnicamente necessário em propriedades com histórico de soja — os parâmetros de solo são previsíveis e a recomendação padrão de 3 t/ha de calcário + 80kg P₂O₅ + 80kg K₂O pode ser aplicada sem análise"],
  correct:1,xp:40,diff:3,
  why:"💡 O diagnóstico integrado é o equivalente ao exame médico completo — prescrever sem diagnosticar é imprudência profissional. Em uma propriedade de 500ha, a variabilidade de solo pode ser enorme: pH de 5,0 a 6,8 na mesma gleba (dado real de fazendas do Cerrado). Aplicar 4 t/ha de calcário onde o pH já é 6,5 gasta R$200.000 sem retorno e pode causar supercalcificação com deficiência de micronutrientes. A grade amostral custa R$40.000-60.000 e se paga na primeira safra com adubação racional."},
  {q:"O plano inclui o terraçamento de 300ha com declividade média de 10%. Usando o método de Bertoni para solo argiloso (fator F = 0,5), qual é o espaçamento vertical (EV) e o espaçamento horizontal (EH) corretos?",
  ctx:"Fórmula de Bertoni: EV(m) = 2 + F × D, onde D = declividade em %. EH(m) = EV / (D/100). Solo: Latossolo argiloso, 55% de argila.",
  opts:["A. EV = 2 + 0,5 × 10 = 7,0m. EH = 7,0 / (10/100) = 70m entre terraços","B. EV = 2 + 10 × 0,5 = 7,0m. EH = EV × 100/D = 7,0 × 100/10 = 70m — mesmo resultado por fórmula alternativa equivalente","C. EV = 10 × 0,5 = 5,0m. EH = 5,0 / 0,10 = 50m — o valor fixo '2' da fórmula de Bertoni só se aplica a solos arenosos","D. EV = 2 × 0,5 × 10 = 10m. EH = 10 / 0,10 = 100m — para solos argilosos, aplica-se um fator multiplicativo, não aditivo","E. EV = 2 + 0,5/10 = 2,05m. EH = 2,05 / 0,10 = 20,5m — o fator F deve ser dividido pela declividade para solos com alto teor de argila"],
  correct:0,xp:42,diff:4,

const PF={fontFamily:"'Courier New',monospace"};
const BG="#0a0a12",CARD="#13131f",BORDER="#2a2a45";
const GOLD="#FFD700",GREEN="#22c55e",RED="#ef4444",BLUE="#60a5fa";
const PURPLE="#a78bfa",TEAL="#2dd4bf",ORANGE="#f97316",GRAY="#6b7280";

const STYLE=`
@keyframes walk{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes floatpet{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-8px) rotate(5deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
`;

function Bar({v,max,color,h=10}){
  return(
    <div style={{height:h,background:"#1a1a2e",border:`1px solid ${BORDER}`,overflow:"hidden"}}>
      <div style={{width:`${Math.max(0,Math.min(100,(v/max)*100))}%`,height:"100%",background:color,transition:"width 0.5s"}}/>
    </div>
  );
}

function App(){
  const[screen,setScreen]=useState("intro");
  const[name,setName]=useState("");
  const[petIdx,setPetIdx]=useState(0);
  const[phase,setPhase]=useState(0);
  const[qIdx,setQIdx]=useState(0);
  const[hp,setHp]=useState(100);
  const[xp,setXp]=useState(0);
  const[level,setLevel]=useState(1);
  const[score,setScore]=useState(0);
  const[streak,setStreak]=useState(0);
  const[answered,setAnswered]=useState(null);
  const[correct,setCorrect]=useState(null);
  const[showWhy,setShowWhy]=useState(false);
  const[log,setLog]=useState([]);
  const[totalRight,setTotalRight]=useState(0);
  const[walkPos,setWalkPos]=useState(0);

  const pet=PETS[petIdx];
  const ph=PHASES[phase];
  const q=ph&&ph.questions[qIdx];
  const totalQ=ph?ph.questions.length:1;
  const xpNext=level*150;

  useEffect(()=>{
    if(screen==="game")setWalkPos(Math.round((qIdx/totalQ)*88));
  },[qIdx,screen,totalQ]);

  const addLog=m=>setLog(l=>[m,...l].slice(0,5));

  const handleAnswer=idx=>{
    if(answered!==null)return;
    setAnswered(idx);
    const ok=idx===q.correct;
    setCorrect(ok);
    setShowWhy(false);
    if(ok){
      const mult=streak>=3?2:streak>=2?1.5:1;
      const gained=Math.round(q.xp*mult);
      const newXp=xp+gained;
      const newLevel=Math.floor(newXp/(newLevel*150||150))+1;
      setXp(newXp%(level*150));
      setLevel(l=>Math.max(l,newLevel));
      setScore(s=>s+gained);
      setStreak(s=>s+1);
      setTotalRight(t=>t+1);
      if(pet.stat==="hp")setHp(h=>Math.min(100,h+8));
      addLog(`✅ +${gained}XP${mult>1?` 🔥x${mult}`:""}`);
    }else{
      const dmg=pet.stat==="def"?10:22;
      const newHp=Math.max(0,hp-dmg);
      setHp(newHp);
      setStreak(0);
      addLog(`❌ -${dmg} HP | Combo zerado`);
      if(newHp<=0){setTimeout(()=>setScreen("over"),1400);return;}
    }
  };

  const nextQ=()=>{
    if(qIdx+1>=totalQ){setScreen("phaseclear");return;}
    setQIdx(i=>i+1);
    setAnswered(null);setCorrect(null);setShowWhy(false);
  };

  const nextPhase=()=>{
    if(phase+1>=PHASES.length){setScreen("victory");return;}
    setPhase(p=>p+1);setQIdx(0);
    setAnswered(null);setCorrect(null);setShowWhy(false);setScreen("game");
    addLog(`🌾 Fase ${phase+2} iniciada!`);
  };

  const restart=()=>{
    setScreen("intro");setPhase(0);setQIdx(0);setHp(100);
    setXp(0);setLevel(1);setScore(0);setStreak(0);
    setAnswered(null);setCorrect(null);setShowWhy(false);
    setLog([]);setTotalRight(0);
  };

  if(screen==="intro")return(
    <div style={{...PF,background:BG,minHeight:"100vh",color:"#ddd",padding:16}}>
      <style>{STYLE}</style>
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <div style={{background:CARD,border:`2px solid ${GOLD}`,borderRadius:4,padding:20,marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:36,animation:"pop 2s infinite",display:"inline-block"}}>🌾</div>
          <div style={{fontSize:18,color:GOLD,letterSpacing:3,marginBottom:2}}>AGROTECH RPG</div>
          <div style={{fontSize:9,color:TEAL,letterSpacing:2}}>◀ TÉCNICO AGRÍCOLA — PIXEL EDITION ▶</div>
          <div style={{fontSize:9,color:GRAY,marginTop:4}}>8 MUNDOS • 64 QUESTÕES • ESTILO 80s</div>
          <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:8,fontSize:12}}>
            {["🍄","⭐","🌀","💎","🔥"].map((e,i)=><span key={i} style={{animation:`blink ${1+i*0.3}s infinite`}}>{e}</span>)}
          </div>
        </div>
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:4,padding:14,marginBottom:12}}>
          <div style={{fontSize:10,color:TEAL,marginBottom:8}}>▶ INSIRA SEU NOME, TÉCNICO:</div>
          <input value={name} onChange={e=>setName(e.target.value)} maxLength={18} placeholder="Player 1..."
            style={{background:"#0d0d1a",border:`1px solid ${BLUE}`,color:GOLD,padding:"8px 10px",fontSize:13,width:"100%",boxSizing:"border-box",borderRadius:2,fontFamily:"'Courier New',monospace",outline:"none"}}/>
        </div>
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:4,padding:14,marginBottom:12}}>
          <div style={{fontSize:10,color:TEAL,marginBottom:10}}>▶ ESCOLHA SEU PET COMPANION:</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {PETS.map((p,i)=>(
              <button key={i} onClick={()=>setPetIdx(i)}
                style={{...PF,background:petIdx===i?"#0d1a2e":"#111",border:`1px solid ${petIdx===i?p.color:BORDER}`,
                  color:petIdx===i?p.color:GRAY,padding:"10px 8px",cursor:"pointer",textAlign:"left",borderRadius:2,fontSize:10}}>
                <div style={{fontSize:22,display:"block",animation:petIdx===i?"floatpet 1.5s infinite":"none"}}>{p.emoji}</div>
                <div style={{color:petIdx===i?GOLD:"#aaa",fontWeight:"bold",marginTop:4}}>{p.label}</div>
                <div style={{color:TEAL,fontSize:9,marginTop:2}}>{p.bonus}</div>
              </button>
            ))}
          </div>
        </div>
        <div style={{background:"#0a0a1a",border:`1px solid ${BORDER}`,borderRadius:4,padding:12,marginBottom:14,fontSize:9,color:GRAY,lineHeight:1.9}}>
          <span style={{color:GOLD}}>HOW TO PLAY:</span> Você é Técnico Agrícola. Cada fase = problema real de campo. 5 opções por questão — leia com atenção! Acertos seguidos = <span style={{color:ORANGE}}>COMBO 🔥</span>. Erros custam HP. Clique "Ver Explicação Técnica" para aprender com dados reais. Complete os 8 Mundos para receber seu Certificado!
        </div>
        <button onClick={()=>{if(name.trim())setScreen("game");}} disabled={!name.trim()}
          style={{...PF,width:"100%",padding:"14px",fontSize:13,letterSpacing:2,cursor:name.trim()?"pointer":"not-allowed",
            background:name.trim()?"#052a05":"#111",color:name.trim()?GREEN:GRAY,
            border:`2px solid ${name.trim()?GREEN:BORDER}`,borderRadius:2}}>
          {name.trim()?`▶ START — ${name.toUpperCase()}`:"INSIRA SEU NOME PARA CONTINUAR"}
        </button>
      </div>
    </div>
  );

  if(screen==="over")return(
    <div style={{...PF,background:"#0d0002",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:RED,padding:20,textAlign:"center"}}>
      <style>{STYLE}</style>
      <div style={{fontSize:52,animation:"shake 0.6s infinite"}}>💀</div>
      <div style={{fontSize:18,color:"#ff3333",margin:"14px 0"}}>GAME OVER</div>
      <div style={{color:GRAY,fontSize:11,maxWidth:360,lineHeight:1.9,marginBottom:14}}>
        Suas decisões causaram danos sérios ao ecossistema, {name}. Revise os conceitos e tente novamente!
      </div>
      <div style={{background:"#1a0004",border:"1px solid #5a0010",padding:12,borderRadius:4,marginBottom:14,fontSize:10,color:GRAY}}>
        Fase {phase+1}/8 • Score: {score} • Lv.{level} • Acertos: {totalRight}
      </div>
      <button onClick={restart} style={{...PF,background:"#1a0004",color:RED,border:`2px solid ${RED}`,padding:"10px 28px",cursor:"pointer",fontSize:13,borderRadius:2}}>▶ TENTAR NOVAMENTE</button>
    </div>
  );

  if(screen==="phaseclear")return(
    <div style={{...PF,background:BG,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:GREEN,padding:20,textAlign:"center"}}>
      <style>{STYLE}</style>
      <div style={{fontSize:52,animation:"pop 0.8s infinite"}}>⭐</div>
      <div style={{fontSize:16,color:GOLD,margin:"12px 0"}}>{ph.world} — COMPLETO!</div>
      <div style={{fontSize:12,color:TEAL,marginBottom:12}}>{ph.title}</div>
      <div style={{background:CARD,border:`1px solid ${GREEN}`,padding:16,borderRadius:4,marginBottom:16,fontSize:10,color:GRAY,minWidth:260}}>
        <div>XP: <span style={{color:GOLD}}>{xp}</span> • Nível: <span style={{color:BLUE}}>Lv.{level}</span></div>
        <div>HP: <span style={{color:GREEN}}>{hp}/100</span> • Score: <span style={{color:ORANGE}}>{score}</span></div>
        {phase+1<PHASES.length&&<div style={{marginTop:8,color:TEAL}}>Próximo: {PHASES[phase+1].title}</div>}
      </div>
      <button onClick={nextPhase} style={{...PF,background:"#052a05",color:GREEN,border:`2px solid ${GREEN}`,padding:"12px 28px",cursor:"pointer",fontSize:12,borderRadius:2}}>
        {phase+1>=PHASES.length?"🏆 VER RESULTADO FINAL":`▶ ${PHASES[phase+1]&&PHASES[phase+1].world}: ${PHASES[phase+1]&&PHASES[phase+1].title}`}
      </button>
    </div>
  );

  if(screen==="victory")return(
    <div style={{...PF,background:"#020d02",minHeight:"100vh",color:GREEN,padding:20,textAlign:"center"}}>
      <style>{STYLE}</style>
      <div style={{maxWidth:560,margin:"0 auto"}}>
        <div style={{fontSize:60,animation:"pop 1s infinite",display:"inline-block"}}>🏆</div>
        <div style={{fontSize:20,color:GOLD,margin:"12px 0",letterSpacing:3}}>PARABÉNS!</div>
        <div style={{background:"#040d04",border:`2px solid ${GOLD}`,borderRadius:8,padding:24,marginBottom:20}}>
          <div style={{fontSize:36,marginBottom:8}}>📜</div>
          <div style={{fontSize:14,color:GOLD,marginBottom:6}}>CERTIFICADO DE EXCELÊNCIA</div>
          <div style={{color:GREEN,fontSize:12}}>Certifica-se que</div>
          <div style={{fontSize:18,color:"#fff",margin:"6px 0"}}>{name.toUpperCase()}</div>
          <div style={{color:GREEN,fontSize:10,lineHeight:2}}>
            completou os 8 Mundos do AgroTech RPG<br/>
            demonstrando domínio em solo, água, fertilizantes,<br/>
            agrotóxicos, monocultura e gestão integrada.<br/><br/>
            <span style={{color:TEAL}}>Companheiro: {pet.emoji} {pet.label}</span><br/>
            <span style={{color:ORANGE}}>Score Final: {score.toLocaleString()} pts</span><br/>
            <span style={{color:GOLD}}>Acertos: {totalRight}/64 questões</span><br/>
            <span style={{color:GRAY}}>HP Final: {hp}/100</span>
          </div>
        </div>
        <div style={{background:"#020d02",border:`1px solid ${GREEN}44`,borderRadius:4,padding:16,marginBottom:16,fontSize:10,color:GRAY,lineHeight:2,textAlign:"left"}}>
          <div style={{color:GOLD,marginBottom:8,textAlign:"center"}}>🌍 SE TODOS APLICASSEM O QUE VOCÊ APRENDEU:</div>
          ✅ -60% de erosão nas bacias agrícolas da região<br/>
          ✅ Recuperação de nascentes em 3-5 anos<br/>
          ✅ -30% no uso de agrotóxicos via MIP e rotação<br/>
          ✅ +25% de produtividade por manejo racional do solo<br/>
          ✅ Rios com OD acima de 5 mg/L e P abaixo de 0,1 mg/L<br/>
          ✅ Sequestro de 1-2 t C/ha/ano no plantio direto 🌱
        </div>
        <button onClick={restart} style={{...PF,background:"#052a05",color:GREEN,border:`2px solid ${GREEN}`,padding:"12px 32px",cursor:"pointer",fontSize:12,borderRadius:2}}>▶ JOGAR NOVAMENTE</button>
      </div>
    </div>
  );

  if(!ph||!q)return null;

  return(
    <div style={{...PF,background:BG,minHeight:"100vh",color:"#e0e0e0"}}>
      <style>{STYLE}</style>
      <div style={{background:"#0d0d1a",borderBottom:`2px solid ${BORDER}`,padding:"6px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,fontSize:9}}>
          <span style={{color:GOLD}}>🌾 {name.toUpperCase()}</span>
          <span style={{color:ORANGE}}>⭐ {score}</span>
          <span style={{color:TEAL}}>{ph.world} • Q{qIdx+1}/{totalQ}</span>
          <span style={{color:GRAY}}>Lv.{level} {pet.emoji}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div>
            <div style={{fontSize:8,color:GREEN,marginBottom:2}}>HP {hp}/100{streak>=2&&<span style={{color:ORANGE}}> 🔥x{streak}</span>}</div>
            <Bar v={hp} max={100} color={hp>50?"#22c55e":hp>25?"#f97316":"#ef4444"}/>
          </div>
          <div>
            <div style={{fontSize:8,color:BLUE,marginBottom:2}}>XP {xp}/{level*150}</div>
            <Bar v={xp} max={level*150} color={BLUE}/>
          </div>
        </div>
      </div>

      <div style={{maxWidth:640,margin:"0 auto",padding:"10px 12px"}}>
        <div style={{background:`${ph.color}22`,border:`1px solid ${ph.accent}55`,borderRadius:4,padding:"8px 12px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <span style={{fontSize:14}}>{ph.icon}</span>
              <span style={{fontSize:11,color:GOLD,marginLeft:8}}>{ph.title}</span>
              <div style={{fontSize:9,color:GRAY,marginTop:2}}>{ph.subtitle}</div>
            </div>
            <div style={{fontSize:9,color:TEAL}}>Fase {phase+1}/8</div>
          </div>
        </div>

        <div style={{background:`linear-gradient(180deg,#001028 0%,${ph.color}44 100%)`,border:`2px solid ${ph.accent}44`,borderRadius:4,padding:"8px 6px",marginBottom:10,position:"relative",height:80,overflow:"hidden"}}>
          {[...Array(8)].map((_,i)=>(
            <div key={i} style={{position:"absolute",top:`${10+Math.random()*40}%`,left:`${i*12+2}%`,width:2,height:2,background:GOLD,animation:`blink ${1+i*0.4}s infinite`}}/>
          ))}
          <div style={{position:"absolute",bottom:0,left:0,right:0,height:18,background:"#1a3a0a"}}/>
          <div style={{position:"absolute",bottom:18,left:0,right:0,height:2,background:"#2a5a1a"}}/>
          {[0,25,50,75,100].map(p=>(
            <div key={p} style={{position:"absolute",bottom:18,left:`${p}%`,fontSize:10,color:walkPos>=p?GOLD:BORDER}}>🚩</div>
          ))}
          <div style={{position:"absolute",bottom:17,left:`${walkPos}%`,transition:"left 0.7s ease",textAlign:"center",lineHeight:1}}>
            <div style={{fontSize:20,animation:"walk 0.5s infinite"}}>👨‍🌾</div>
            <div style={{fontSize:12,animation:"floatpet 1.2s infinite",marginTop:-6}}>{pet.emoji}</div>
          </div>
          <div style={{position:"absolute",bottom:16,right:10,fontSize:16}}>🏁</div>
          <div style={{position:"absolute",top:5,left:8,right:8,fontSize:8,color:"#88aacc",lineHeight:1.5}}>
            {ph.story.slice(0,90)}...
          </div>
        </div>

        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:4,padding:12,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div style={{fontSize:9,color:PURPLE}}>Q{qIdx+1} — {"★".repeat(q.diff)}{"☆".repeat(5-q.diff)}</div>
            <div style={{fontSize:9,color:TEAL}}>+{q.xp} XP</div>
          </div>
          <div style={{fontSize:11,color:"#ddd",lineHeight:1.8,marginBottom:8}}>{q.q}</div>
          {q.ctx&&(
            <div style={{background:"#0a0a1a",border:`1px solid ${BORDER}`,borderRadius:2,padding:"6px 10px",fontSize:9,color:GRAY,lineHeight:1.7}}>
              {q.ctx}
            </div>
          )}
        </div>

        <div style={{display:"grid",gap:7,marginBottom:10}}>
          {q.opts.map((opt,i)=>{
            let bg=CARD,border=BORDER,col="#bbb";
            if(answered!==null){
              if(i===q.correct){bg="#031a03";border=GREEN;col=GREEN;}
              else if(i===answered&&i!==q.correct){bg="#1a0303";border=RED;col=RED;}
              else{col="#444";border="#1a1a2e";}
            }
            return(
              <button key={i} onClick={()=>handleAnswer(i)} disabled={answered!==null}
                style={{...PF,background:bg,border:`1px solid ${border}`,color:col,
                  padding:"9px 12px",cursor:answered!==null?"default":"pointer",
                  textAlign:"left",fontSize:10,lineHeight:1.6,borderRadius:2}}>
                {opt}
                {answered!==null&&i===q.correct&&" ✅"}
                {answered!==null&&i===answered&&i!==q.correct&&" ❌"}
              </button>
            );
          })}
        </div>

        {answered!==null&&(
          <div style={{background:correct?"#021502":"#150202",border:`1px solid ${correct?GREEN:RED}44`,borderRadius:4,padding:12,marginBottom:10}}>
            <div style={{fontSize:10,color:correct?GREEN:RED,marginBottom:6}}>
              {correct?"✅ RESPOSTA CORRETA!":"❌ RESPOSTA INCORRETA"}
              {streak>=3&&correct&&<span style={{color:ORANGE}}> 🔥 COMBO x{streak}!</span>}
            </div>
            <button onClick={()=>setShowWhy(!showWhy)}
              style={{...PF,background:"transparent",border:`1px solid ${TEAL}`,color:TEAL,padding:"4px 12px",cursor:"pointer",fontSize:9,borderRadius:2,marginBottom:6}}>
              {showWhy?"▲ OCULTAR EXPLICAÇÃO TÉCNICA":"▼ VER EXPLICAÇÃO TÉCNICA"}
            </button>
            {showWhy&&(
              <div style={{fontSize:10,color:"#aac8aa",lineHeight:1.9,borderTop:`1px solid ${BORDER}`,paddingTop:8,marginTop:6,whiteSpace:"pre-line"}}>
                {q.why}
              </div>
            )}
            <div style={{marginTop:8}}>
              <button onClick={nextQ}
                style={{...PF,background:correct?"#031a03":"#1a0a02",color:correct?GREEN:ORANGE,
                  border:`1px solid ${correct?GREEN:ORANGE}`,padding:"8px 20px",cursor:"pointer",fontSize:11,borderRadius:2}}>
                {qIdx+1>=totalQ?"⭐ COMPLETAR FASE":"▶ PRÓXIMA QUESTÃO"}
              </button>
            </div>
          </div>
        )}

        <div style={{background:"#070710",border:`1px solid ${BORDER}`,borderRadius:2,padding:"6px 8px",fontSize:8,color:GRAY,maxHeight:44,overflowY:"auto",marginBottom:8}}>
          {log.length===0?"[ LOG DE COMBATE ]":log.map((l,i)=><div key={i}>{l}</div>)}
        </div>

        <div style={{display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap"}}>
          {PHASES.map((p,i)=>(
            <div key={i} style={{textAlign:"center"}}>
              <div style={{fontSize:i===phase?12:8,marginBottom:2,opacity:i<=phase?1:0.3}}>{p.icon}</div>
              <div style={{width:i===phase?18:14,height:i===phase?8:5,margin:"0 auto",
                background:i<phase?GREEN:i===phase?GOLD:"#222",
                border:`1px solid ${i===phase?GOLD:BORDER}`,borderRadius:1}}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
